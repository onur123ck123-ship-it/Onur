<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ÇeşmeAşk</title><style>*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#dff7ff,#fff7ed);color:#082f49}#app{max-width:560px;margin:auto;padding:18px 14px 98px}.top{display:flex;justify-content:space-between;align-items:center;margin:18px 0}.brand{font-size:38px;font-weight:950;margin:0}.eyebrow{margin:0;color:#64748b;font-weight:800}.logo{width:56px;height:56px;border-radius:18px;background:#0ea5e9;color:white;display:grid;place-items:center;font-size:28px}.card{background:#ffffffee;border-radius:28px;padding:20px;margin:12px 0;box-shadow:0 18px 46px #07598524}h2{font-size:28px;margin-top:0}.muted{color:#64748b;line-height:1.45}.btn{width:100%;border:0;border-radius:18px;padding:15px;margin-top:10px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:white;font-weight:950;font-size:16px}.light{background:#eff6ff;color:#075985}.red{background:#fee2e2;color:#991b1b}.row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;text-align:center;padding:12px}.stat b{display:block;font-size:22px}.venue,.personrow{width:100%;display:flex;gap:12px;align-items:center;text-align:left;border:1px solid #e2e8f0;background:white;border-radius:22px;padding:14px;margin:9px 0}.emoji{width:50px;height:50px;border-radius:18px;background:#e0f2fe;display:grid;place-items:center;font-size:26px}.right{margin-left:auto;text-align:right;color:#0e7490;font-weight:950;font-size:12px}.tabs{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:min(540px,calc(100% - 18px));display:grid;grid-template-columns:repeat(5,1fr);gap:5px;background:#ffffffdf;padding:8px;border-radius:24px;box-shadow:0 12px 35px #07598530}.tab{border:0;border-radius:16px;padding:10px 2px;background:transparent;color:#64748b;font-weight:950;font-size:12px}.tab.on{background:#dff6ff;color:#075985}.msg{background:#f8fafc;border-radius:16px;padding:12px;margin:8px 0}.me{background:#dff6ff;margin-left:40px}.del{border:0;background:#fee2e2;color:#991b1b;border-radius:10px;padding:6px 8px;font-weight:900;margin-left:8px;float:right}input,textarea{width:100%;border:1px solid #cbd5e1;border-radius:16px;padding:13px;margin-top:6px;font:inherit}label{display:block;margin:10px 0;font-weight:850}.ok{background:#dcfce7;color:#166534;border-radius:16px;padding:12px;font-weight:950}.warn{background:#fff7ed;color:#9a3412;border-radius:16px;padding:12px;font-weight:950}.bad{background:#fee2e2;color:#991b1b;border-radius:16px;padding:12px;font-weight:950}.livebox{max-height:360px;overflow:auto;background:#f8fafc;border-radius:18px;padding:10px}.pill{display:inline-block;background:#e0f2fe;border-radius:999px;padding:7px 10px;margin:4px 4px 0 0;font-size:12px;font-weight:900}</style></head><body><div id="app"></div><nav id="tabs" class="tabs"></nav><script>var tab='mekan',timer=null,livePeople=[];var API='https://bztigwfnenwosulhxrxo.supabase.co/rest/v1/';var KEY='sb_publishable_P76ca2ta_N7PWpA_Wm6lTw__DEzK19l';var me=JSON.parse(localStorage.me||'null'),check=JSON.parse(localStorage.check||'null');var venues=[['starbucks','Starbucks Ilıca','Ilıca','Kahve','☕'],['alacati','Alaçatı Çarşı','Alaçatı','Gezi','🧿'],['marina','Çeşme Marina','Merkez','Marina','⛵'],['before','Before Sunset','Ovacık','Beach','🌅'],['ayayorgi','Aya Yorgi','Ayayorgi','Beach','🌙']];function dev(){var d=localStorage.ca_device;if(!d){d='dev_'+Math.random().toString(36).slice(2)+'_'+Date.now();localStorage.ca_device=d}return d}function E(s){return String(s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}function H(){return '<div class="top"><div><p class="eyebrow">Çeşme sosyal check-in</p><h1 class="brand">ÇeşmeAşk</h1></div><div class="logo">💙</div></div>'}function T(){var a=[['mekan','📍 Mekân'],['kesfet','💫 Keşfet'],['chat','💬 Chat'],['canli','⚡ Canlı'],['profil','👤 Profil']],h='';a.forEach(function(x){h+='<button class="tab '+(tab==x[0]?'on':'')+'" onclick="go(\''+x[0]+'\')">'+x[1]+'</button>'});tabs.innerHTML=h}function draw(){T();if(!me&&tab!='profil'&&tab!='canli')return profil(true);if(tab=='mekan')return mekan();if(tab=='kesfet')return kesfet();if(tab=='chat')return chat();if(tab=='canli')return live();profil()}function go(t){if(timer){clearInterval(timer);timer=null}tab=t;draw()}window.go=go;async function rq(path,params,opt){var u=new URL(API+path);Object.keys(params||{}).forEach(k=>u.searchParams.set(k,params[k]));var c=new AbortController(),to=setTimeout(()=>c.abort(),6000);var r=await fetch(u,{method:(opt&&opt.method)||'GET',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json',...((opt&&opt.headers)||{})},body:(opt&&opt.body)?JSON.stringify(opt.body):undefined,signal:c.signal});clearTimeout(to);var tx=await r.text(),d=tx?JSON.parse(tx):null;if(!r.ok)throw new Error((d&&d.message)||tx||r.statusText);return d}async function saveProfile(){var n=pname.value.trim()||'Onur',a=parseInt(page.value||'19',10),b=pbio.value.trim()||'Çeşmedeyim, iyi sohbet iyi gider.';try{var p=await rq('rpc/upsert_device_profile',{}, {method:'POST',body:{p_device_id:dev(),p_display_name:n,p_age:a,p_bio:b}});me={name:p.display_name||n,age:p.age||a,bio:p.bio||b};localStorage.me=JSON.stringify(me);alert('Profil kaydedildi ✅');tab='mekan';draw()}catch(e){alert('Profil kaydedilemedi: '+e.message)}}window.saveProfile=saveProfile;function profil(first){var n=(me&&me.name)||'',a=(me&&me.age)||'',b=(me&&me.bio)||'';app.innerHTML=H()+'<article class="card"><h2>'+(first?'Profil oluştur':'Profil')+'</h2><p class="muted">Bu bilgiler artık Supabase’e cihazınla kaydedilecek.</p><label>Ad<input id="pname" value="'+E(n)+'" placeholder="Onur"></label><label>Yaş<input id="page" type="number" value="'+E(a)+'" placeholder="19"></label><label>Bio<textarea id="pbio" rows="3" placeholder="Kısa bio">'+E(b)+'</textarea></label><button class="btn" onclick="saveProfile()">Profili kaydet</button><button class="btn red" onclick="localStorage.clear();location.reload()">Bu cihazı sıfırla</button></article>'}function mekan(){var h=H()+'<article class="card"><h2>Bugün nerdesin?</h2><p class="muted">Mekân seçince gerçek check-in DB’ye yazılır. Aynı mekândaki kişiler Keşfet’te görünür.</p>'+(check?'<p class="ok">Check-in: '+E(check.name)+'</p>':'<p class="warn">Aktif check-in yok.</p>')+'</article>';venues.forEach(v=>h+='<button class="venue" onclick="ci(\''+v[0]+'\')"><span class="emoji">'+v[4]+'</span><span><b>'+v[1]+'</b><br><small>'+v[2]+' · '+v[3]+'</small></span><span class="right">Canlı<br>DB</span></button>');app.innerHTML=h}async function ci(id){var v=venues.find(x=>x[0]==id);try{await rq('rpc/device_checkin',{}, {method:'POST',body:{p_device_id:dev(),p_venue_id:id}});check={id:v[0],name:v[1]};localStorage.check=JSON.stringify(check);alert(v[1]+' check-in tamam ✅');tab='kesfet';draw()}catch(e){alert('Check-in olmadı: '+e.message)}}window.ci=ci;async function loadPeople(){if(!check)return[];return await rq('rpc/people_at_venue',{}, {method:'POST',body:{p_venue_id:check.id,p_my_device:dev()}})}async function kesfet(){if(!check){app.innerHTML=H()+'<article class="card"><h2>Önce mekâna check-in yap</h2><button class="btn" onclick="go(\'mekan\')">Mekân seç</button></article>';return}app.innerHTML=H()+'<article class="card"><h2>'+E(check.name)+'</h2><p class="warn">Aynı mekândaki gerçek kullanıcılar yükleniyor...</p></article>';try{livePeople=await loadPeople();var h=H()+'<article class="card"><h2>'+E(check.name)+'</h2><p class="muted">Aynı mekândaki gerçek kullanıcılar.</p>'+(livePeople.length?'<p class="ok">'+livePeople.length+' kişi bulundu ✅</p>':'<p class="warn">Şimdilik başka kimse yok. İkinci telefondan aynı mekâna gir.</p>')+'</article>';livePeople.forEach((p,i)=>h+='<button class="personrow" onclick="openPerson('+i+')"><span class="emoji">👤</span><span><b>'+E(p.display_name)+', '+E(p.age||'')+'</b><br><small>'+E(p.bio||'Bio yok')+'</small></span><span class="right">Canlı<br>kişi</span></button>');app.innerHTML=h}catch(e){app.innerHTML=H()+'<article class="card"><h2>Keşfet hata</h2><p class="bad">'+E(e.message)+'</p></article>'}}function openPerson(i){var p=livePeople[i];localStorage.currentChat=JSON.stringify(p);tab='chat';draw()}window.openPerson=openPerson;function chat(){var p=JSON.parse(localStorage.currentChat||'null');if(!p){app.innerHTML=H()+'<article class="card"><h2>Önce Keşfet’ten kişi seç</h2><button class="btn" onclick="go(\'kesfet\')">Keşfet</button></article>';return}app.innerHTML=H()+'<article class="card"><h2>'+E(p.display_name)+' ile sonraki adım</h2><p class="muted">Kişi seçme çalışıyor. Bir sonraki geliştirmede bu kişiye özel match ve özel chat kuracağız.</p><p class="ok">Seçilen cihaz: '+E(p.device_id)+'</p><button class="btn light" onclick="go(\'canli\')">Şimdilik canlı test odasına git</button></article>'}function live(){var n=(me&&me.name)||localStorage.liveName||'Onur';app.innerHTML=H()+'<article class="card"><h2>Canlı Chat Testi</h2><p class="muted">Sil butonu sadece bu cihazdan atılan mesajlarda görünür.</p><div id="liveStatus" class="warn">Bağlanıyor...</div><label>İsim<input id="liveName" value="'+E(n)+'"></label><div id="liveMsgs" class="livebox">Mesajlar yükleniyor...</div><label>Mesaj<input id="liveInput" placeholder="Selam canlı test"></label><button class="btn" onclick="sendLive()">Canlı gönder</button><button class="btn light" onclick="refreshLive()">Yenile</button></article>';refreshLive();timer=setInterval(refreshLive,3000)}async function refreshLive(){var box=document.getElementById('liveMsgs'),st=document.getElementById('liveStatus');if(!box)return;try{var data=await rq('chat_room_messages',{select:'id,sender_name,sender_device,body,created_at',room_id:'eq.cesme-test',order:'created_at.asc',limit:'60'});var my=dev();st.className='ok';st.textContent='Canlı DB bağlı ✅ Sadece kendi mesajını silebilirsin';box.innerHTML=(data||[]).map(m=>{var own=m.sender_device==my;return '<div class="msg '+(own?'me':'')+'"><b>'+E(m.sender_name)+':</b> '+E(m.body)+(own?'<button class="del" onclick="deleteLive(\''+m.id+'\')">Sil</button>':'')+'</div>'}).join('')||'<p class="muted">Henüz mesaj yok.</p>';box.scrollTop=box.scrollHeight}catch(e){st.className='bad';st.textContent='Canlı DB hatası: '+e.message}}async function sendLive(){var name=liveName.value.trim()||'Onur',body=liveInput.value.trim();if(!body)return;localStorage.liveName=name;try{await rq('chat_room_messages',{}, {method:'POST',headers:{Prefer:'return=minimal'},body:{room_id:'cesme-test',sender_name:name,sender_device:dev(),body:body}});liveInput.value='';refreshLive()}catch(e){alert('Gönderilemedi: '+e.message)}}async function deleteLive(id){if(!confirm('Kendi mesajın silinsin mi?'))return;try{var ok=await rq('rpc/delete_own_chat_message',{}, {method:'POST',body:{p_message_id:id,p_sender_device:dev()}});if(!ok)alert('Bu mesaj bu cihaza ait değil.');refreshLive()}catch(e){alert('Silinemedi: '+e.message)}}window.refreshLive=refreshLive;window.sendLive=sendLive;window.deleteLive=deleteLive;draw();</script></body></html>
