<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ÇeşmeAşk</title>
<style>
  *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#e0f7ff,#fff7ed);color:#082f49} main{max-width:520px;margin:auto;padding:18px 14px 90px}.card{background:#ffffffee;border:1px solid #fff;border-radius:26px;padding:18px;margin:12px 0;box-shadow:0 18px 50px #07598524} h1{font-size:36px;margin:0} h2{margin:0 0 8px;font-size:27px}.muted{color:#64748b}.top{display:flex;align-items:center;justify-content:space-between}.logo{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;background:#0ea5e9;color:white;font-size:28px}.btn{width:100%;border:0;border-radius:18px;padding:14px;margin-top:10px;font-weight:900;background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:white;font-size:16px}.ghost{background:#eff6ff;color:#075985}.bad{background:#fee2e2;color:#991b1b}.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:12px;text-align:center}.stat b{display:block;font-size:22px}.venue{display:flex;gap:12px;align-items:center;width:100%;border:1px solid #e2e8f0;background:white;border-radius:22px;padding:14px;margin:8px 0;text-align:left}.emoji{width:48px;height:48px;border-radius:17px;background:#e0f2fe;display:grid;place-items:center;font-size:25px}.right{margin-left:auto;text-align:right;font-size:12px;color:#0e7490;font-weight:900}.tabs{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:min(520px,calc(100% - 18px));display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:#ffffffdd;padding:8px;border-radius:24px;box-shadow:0 12px 35px #07598530}.tab{border:0;border-radius:16px;padding:10px 4px;background:transparent;color:#64748b;font-weight:900}.tab.on{background:#dff6ff;color:#075985}.profile{min-height:420px;border-radius:30px;background:linear-gradient(160deg,#0ea5e9,#fb923c);color:white;padding:22px;display:flex;flex-direction:column;justify-content:flex-end}.pill{display:inline-block;background:#ffffff33;border-radius:999px;padding:7px 10px;margin:4px;font-size:12px;font-weight:800}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.round{border:0;border-radius:20px;background:white;padding:18px;font-size:26px;box-shadow:0 10px 25px #07598520}.msg{background:#f8fafc;border-radius:16px;padding:11px;margin:8px 0}.me{background:#dff6ff;margin-left:40px}input,textarea{width:100%;border:1px solid #cbd5e1;border-radius:16px;padding:12px;margin-top:6px}label{display:block;margin:10px 0;font-weight:800}.ok{background:#dcfce7;color:#166534;border-radius:16px;padding:12px;font-weight:900}.warn{background:#fff7ed;color:#9a3412;border-radius:16px;padding:12px;font-weight:900}
</style>
</head>
<body>
<main>
  <div class="top"><div><p class="muted">Çeşme sosyal check-in</p><h1>ÇeşmeAşk</h1></div><div class="logo">💙</div></div>
  <section id="screen"></section>
</main>
<nav class="tabs" id="nav"></nav>
<script>
const venues=[
 ['starbucks','Starbucks Ilıca','Ilıca','☕',12,8,4],['alacati','Alaçatı Çarşı','Alaçatı','🧿',18,11,7],['marina','Çeşme Marina','Merkez','⛵',9,5,4],['beach','Before Sunset','Ovacık','🌅',15,9,6],['ayayorgi','Aya Yorgi','Ayayorgi','🌙',22,13,9]
];
const people=[
 ['Ada',20,'Kahve + deniz + sakin sohbet.','starbucks',['kahve','deniz','müzik']],['Lara',21,'Çeşme planı spontane olur.','starbucks',['beach','tatlı','foto']],['Mira',19,'Alaçatıdayım, komik açılışlara varım.','alacati',['dans','kahve','gezi']],['Selin',21,'Önce chat, sonra belki selam.','beach',['deniz','lofi','sohbet']],['Naz',20,'Aya Yorgi tarafı, güzel müzik arıyorum.','ayayorgi',['müzik','beach','kahve']]
];
let tab=localStorage.tab||'mekan';
function save(k,v){localStorage[k]=JSON.stringify(v)} function load(k,d){try{return JSON.parse(localStorage[k])}catch{return d}}
function check(){return load('checkin',null)}
function setTab(t){tab=t;localStorage.tab=t;draw()}
function nav(){document.getElementById('nav').innerHTML=[['mekan','📍 Mekân'],['kesfet','💫 Keşfet'],['chat','💬 Chat'],['profil','👤 Profil']].map(x=>`<button class="tab ${tab==x[0]?'on':''}" onclick="setTab('${x[0]}')">${x[1]}</button>`).join('')}
function draw(){nav(); if(!load('me',null)) return onboard(); ({mekan,kesfet,chat,profil})[tab]();}
function onboard(){screen.innerHTML=`<div class="card"><h2>Aynı mekândasın, tanışmak karşılıklıysa başlasın.</h2><p class="muted">Tam konum yok. Sadece seçtiğin mekâna check-in.</p><label>Ad<input id="ad" placeholder="Onur"></label><label>Yaş<input id="yas" type="number" placeholder="19"></label><button class="btn" onclick="save('me',{ad:ad.value||'Onur',yas:yas.value||19});draw()">Başla</button></div>`}
function mekan(){let c=check();let total=venues.reduce((a,v)=>a+v[4],0);let women=venues.reduce((a,v)=>a+v[5],0);screen.innerHTML=`<div class="card"><h2>Bugün nerdesin?</h2><div class="row"><div class="stat"><b>${total}</b>kişi</div><div class="stat"><b>${women}</b>kadın</div><div class="stat"><b>${total-women}</b>erkek</div></div>${c?`<p class="ok">✅ Check-in: ${c.name}</p><button class="btn bad" onclick="localStorage.removeItem('checkin');draw()">Check-in bitir</button>`:`<p class="warn">Aktif check-in yok.</p>`}</div>`+venues.map(v=>`<button class="venue" onclick="save('checkin',{id:'${v[0]}',name:'${v[1]}'});setTab('kesfet')"><span class="emoji">${v[3]}</span><span><b>${v[1]}</b><br><small>${v[2]}</small></span><span class="right">${v[4]} kişi<br>♀ ${v[5]} · ♂ ${v[6]}</span></button>`).join('')}
function currentPeople(){let c=check();return c?people.filter(p=>p[3]==c.id):[]}
function kesfet(){let c=check();if(!c)return screen.innerHTML=`<div class="card"><h2>Önce mekâna check-in yap</h2><button class="btn" onclick="setTab('mekan')">Mekân seç</button></div>`;let p=currentPeople()[load('i',0)%Math.max(1,currentPeople().length)];if(!p)return screen.innerHTML=`<div class="card"><h2>Bu mekânda şimdilik demo kişi yok</h2><button class="btn" onclick="setTab('mekan')">Başka mekân seç</button></div>`;screen.innerHTML=`<div class="profile"><h2>${p[0]}, ${p[1]}</h2><p>${p[2]}</p><div>${p[4].map(x=>`<span class="pill">${x}</span>`).join('')}</div></div><div class="actions"><button class="round" onclick="next()">❌</button><button class="round" onclick="match('${p[0]}')">💙</button></div>`}
function next(){save('i',load('i',0)+1);draw()} function match(n){save('match',n);alert('Match oldu: '+n);setTab('chat')}
function chat(){let m=load('match',null);screen.innerHTML=m?`<div class="card"><h2>${m} ile chat</h2><div class="msg">Selam, aynı mekândayız sanırım 😄</div><div class="msg me">ÇeşmeAşk test yayında çalışıyor 🔥</div><button class="btn ghost" onclick="alert('Gerçek chat için sıradaki adım Supabase bağlantısı.')">Mesaj gönder</button></div>`:`<div class="card"><h2>Henüz match yok</h2><button class="btn" onclick="setTab('kesfet')">Keşfet</button></div>`}
function profil(){let m=load('me',{});screen.innerHTML=`<div class="card"><h2>${m.ad}, ${m.yas}</h2><p class="muted">Demo profil</p><button class="btn bad" onclick="localStorage.clear();location.reload()">Sıfırla</button></div>`}
draw();
</script>
</body>
</html>
