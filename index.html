<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ÇeşmeAşk</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;background:#eaf8ff;color:#082f49}#map{height:100vh}.top{position:fixed;top:10px;left:10px;right:10px;z-index:900;background:white;border-radius:18px;padding:10px;box-shadow:0 8px 30px #0002}.panel{display:none;position:fixed;z-index:950;left:10px;right:10px;top:92px;bottom:82px;background:white;border-radius:22px;padding:16px;overflow:auto}.panel.on{display:block}.tabs{position:fixed;left:50%;bottom:10px;transform:translateX(-50%);z-index:1000;width:min(580px,calc(100% - 14px));display:grid;grid-template-columns:repeat(5,1fr);gap:5px;background:white;border-radius:22px;padding:7px}.tab{border:0;border-radius:15px;padding:10px 2px;background:#eff6ff;color:#075985;font-size:12px;font-weight:900}.tab.on{background:#0ea5e9;color:white}.btn{width:100%;border:0;border-radius:15px;padding:13px;margin-top:9px;background:#0ea5e9;color:white;font-weight:950}.light{background:#eff6ff;color:#075985}.card{background:#f8fafc;border:1px solid #dbeafe;border-radius:18px;padding:13px;margin:9px 0}.ok{background:#dcfce7;color:#166534;border-radius:15px;padding:11px}.warn{background:#fff7ed;color:#9a3412;border-radius:15px;padding:11px}.bad{background:#fee2e2;color:#991b1b;border-radius:15px;padding:11px}input,textarea{width:100%;border:1px solid #cbd5e1;border-radius:14px;padding:12px;margin:7px 0 12px}.msg{background:white;border-radius:14px;padding:10px;margin:8px 0}.me{background:#dff6ff;margin-left:38px}.chatbox{height:38vh;overflow:auto;background:#f8fafc;border:1px solid #dbeafe;border-radius:18px;padding:10px}.pin{position:relative}.pinb{background:white;border:2px solid #0ea5e9;border-radius:16px;padding:5px 8px;box-shadow:0 8px 22px #07598555;text-align:center}.cnt{position:absolute;right:-9px;top:-9px;background:#ef4444;color:white;border-radius:999px;min-width:23px;height:23px;padding:3px;font-size:12px;font-weight:950;text-align:center}</style></head><body><div class="top"><b>ÇeşmeAşk</b><br><small>Mekânı seç · Orada görün · Profilini göster</small></div><div id="map"></div><section id="venue" class="panel"><h2 id="venueTitle">Mekân</h2><div id="venueInfo" class="warn">Yükleniyor...</div><button class="btn" onclick="checkInSelected()">📍 Buradayım</button><button class="btn light" onclick="loadPeople()">Detay gör</button><div id="peopleList"></div></section><section id="profile" class="panel"><h2>👤 Profil</h2><input id="name" placeholder="Ad"><input id="age" type="number" placeholder="Yaş"><input id="height" type="number" placeholder="Boy cm"><input id="weight" type="number" placeholder="Kilo kg"><textarea id="bio" rows="3" placeholder="Biyografi"></textarea><input id="interests" placeholder="İlgi alanları"><input id="photoUrl" placeholder="Foto URL"><button class="btn" onclick="saveProfile()">Profili kaydet</button><div id="profileSaved"></div></section><section id="messages" class="panel"><h2>💬 Mesajlar</h2><div class="ok">Benim kodum: <b id="myCode"></b></div><input id="dmName" placeholder="Kişi adı"><input id="dmDevice" placeholder="Karşı cihaz kodu"><button class="btn" onclick="startDm()">Sohbet başlat</button><div id="dmList" class="card"></div><div id="dmChat" style="display:none"><h3 id="dmTitle"></h3><div id="dmBox" class="chatbox"></div><input id="dmText" placeholder="Mesaj"><button class="btn" onclick="sendDm()">Gönder</button></div></section><section id="live" class="panel"><h2>⚡ Canlı</h2><div id="liveBox" class="chatbox"></div><input id="liveName" placeholder="İsim"><input id="liveText" placeholder="Genel mesaj"><button class="btn" onclick="sendLive()">Gönder</button></section><section id="game" class="panel"><h2>🎮 Oyun</h2><p>Skor: <b id="score">0</b></p><button class="btn" onclick="score.textContent=Number(score.textContent)+1">💙 Tıkla</button></section><nav class="tabs"><button id="bmap" class="tab on" onclick="show('map')">🗺️ Harita</button><button id="bmsg" class="tab" onclick="show('messages')">💬 Mesaj</button><button id="blive" class="tab" onclick="show('live')">⚡ Canlı</button><button id="bgame" class="tab" onclick="show('game')">🎮 Oyun</button><button id="bprof" class="tab" onclick="show('profile')">👤 Profil</button></nav><script>var API='https://bztigwfnenwosulhxrxo.supabase.co/rest/v1/';var KEY='sb_publishable_P76ca2ta_N7PWpA_Wm6lTw__DEzK19l';var map,venues=[],selected=null,dmTimer=null,liveTimer=null,currentDm=null;function dev(){var d=localStorage.ca_device;if(!d){d='dev_'+Math.random().toString(36).slice(2)+'_'+Date.now();localStorage.ca_device=d}return d}function esc(s){return String(s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}async function api(path,params,opt){var u=new URL(API+path);Object.keys(params||{}).forEach(function(k){u.searchParams.set(k,params[k])});var r=await fetch(u,{method:(opt&&opt.method)||'GET',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json',...((opt&&opt.headers)||{})},body:(opt&&opt.body)?JSON.stringify(opt.body):undefined});var t=await r.text();var d=t?JSON.parse(t):null;if(!r.ok)throw Error((d&&d.message)||t||r.statusText);return d}function getProfile(){try{return JSON.parse(localStorage.profile||'{}')}catch(e){return {}}}function show(id){document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));if(liveTimer)clearInterval(liveTimer);if(dmTimer)clearInterval(dmTimer);if(id==='map'){bmap.classList.add('on');map.invalidateSize();loadVenues();return}document.getElementById(id).classList.add('on');({messages:bmsg,live:blive,game:bgame,profile:bprof,venue:bmap}[id]||bmap).classList.add('on');if(id==='messages'){myCode.textContent=dev();renderDmList()}if(id==='live'){refreshLive();liveTimer=setInterval(refreshLive,3000)}}function pinIcon(v){return L.divIcon({className:'pin',html:'<div class="pinb">'+(v.emoji||'📍')+'<br><small>'+esc(v.name)+'</small></div><div class="cnt">'+(v.live_count||0)+'</div>',iconSize:[78,58],iconAnchor:[39,58],popupAnchor:[0,-58]})}async function loadVenues(){venues=await api('rpc/venues_with_counts',{}, {method:'POST'});if(!map){map=L.map('map').setView([38.302,26.34],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map)}map.eachLayer(function(l){if(l instanceof L.Marker)map.removeLayer(l)});venues.forEach(function(v){if(!v.lat||!v.lng)return;L.marker([v.lat,v.lng],{icon:pinIcon(v)}).addTo(map).bindPopup('<b>'+esc(v.emoji||'📍')+' '+esc(v.name)+'</b><br><b>'+Number(v.live_count||0)+' kişi burada</b><br><button onclick="selectVenue(\''+v.id+'\')">Detay gör</button><button onclick="quickCheckIn(\''+v.id+'\')">Buradayım</button>')})}function selectVenue(id){selected=venues.find(v=>v.id===id);venueTitle.textContent=(selected.emoji||'📍')+' '+selected.name;venueInfo.className='ok';venueInfo.innerHTML='<b>'+Number(selected.live_count||0)+' kişi burada.</b>';peopleList.innerHTML='';show('venue');loadPeople()}window.selectVenue=selectVenue;async function ensureProfile(){var p=getProfile();if(!p.name){show('profile');alert('Önce profil adını doldur.');throw Error('Profil gerekli')}await api('rpc/upsert_device_profile_v3',{}, {method:'POST',body:{p_device_id:dev(),p_display_name:p.name,p_age:parseInt(p.age||0)||null,p_height_cm:parseInt(p.height||0)||null,p_weight_kg:parseInt(p.weight||0)||null,p_bio:p.bio||'',p_interests:p.interests||'',p_instagram:'',p_photo_url:p.photoUrl||''}})}async function quickCheckIn(id){selected=venues.find(v=>v.id===id);await checkInSelected()}window.quickCheckIn=quickCheckIn;async function checkInSelected(){try{await ensureProfile();await api('rpc/device_checkin',{}, {method:'POST',body:{p_device_id:dev(),p_venue_id:selected.id}});venueInfo.className='ok';venueInfo.innerHTML='Burada görünüyorsun ✅';await loadVenues();await loadPeople()}catch(e){if(e.message!=='Profil gerekli')alert(e.message)}}window.checkInSelected=checkInSelected;async function loadPeople(){if(!selected)return;peopleList.innerHTML='<div class="warn">Yükleniyor...</div>';try{var ps=await api('rpc/people_at_venue_v2',{}, {method:'POST',body:{p_venue_id:selected.id,p_my_device:dev()}});if(!ps.length){peopleList.innerHTML='<div class="warn">Senden başka profil yok. Başka telefondan aynı mekâna Buradayım yap.</div>';return}window.lastPeople=ps;peopleList.innerHTML=ps.map(function(p,i){return '<div class="card"><b>'+esc(p.display_name)+', '+esc(p.age||'?')+'</b><br><small>'+esc(p.bio||'Bio yok')+'</small><button class="btn light" onclick="openUser('+i+')">Profili gör</button></div>'}).join('')}catch(e){peopleList.innerHTML='<div class="bad">'+esc(e.message)+'</div>'}}window.loadPeople=loadPeople;function openUser(i){var p=lastPeople[i];peopleList.innerHTML='<div class="card"><h2>'+esc(p.display_name)+'</h2><p>'+esc(p.age||'?')+' yaş</p><p>'+esc(p.bio||'Bio yok')+'</p><p>'+esc(p.interests||'')+'</p><button class="btn" onclick="likeUser(\''+p.device_id+'\')">💙 Beğen</button><button class="btn light" onclick="startDmWith(\''+p.device_id+'\',\''+esc(p.display_name)+'\')">💬 Yaz</button><button class="btn light" onclick="loadPeople()">Geri</button></div>'}window.openUser=openUser;async function likeUser(d){await api('rpc/like_profile',{}, {method:'POST',body:{p_from_device:dev(),p_to_device:d,p_venue_id:selected.id}});alert('Beğendin ✅')}window.likeUser=likeUser;function chats(){return JSON.parse(localStorage.dmChats||'[]')}function saveChats(a){localStorage.dmChats=JSON.stringify(a)}function roomFor(a,b){return a<b?'dm:'+a+':'+b:'dm:'+b+':'+a}function startDmWith(d,n){var room=roomFor(dev(),d);var a=chats().filter(x=>x.room!==room);a.unshift({room:room,name:n,device:d});saveChats(a);show('messages');openDm(room,n,d)}window.startDmWith=startDmWith;function startDm(){var other=dmDevice.value.trim();var n=dmName.value.trim()||other;if(!other)return alert('Kod lazım');startDmWith(other,n)}function renderDmList(){var a=chats();dmList.innerHTML=a.length?a.map(x=>'<button class="btn light" onclick="openDm(\''+x.room+'\',\''+esc(x.name)+'\',\''+x.device+'\')">'+esc(x.name)+'</button>').join(''):'Sohbet yok.'}function openDm(room,n,d){currentDm={room:room,name:n,device:d};dmChat.style.display='block';dmTitle.textContent=n;refreshDm();dmTimer=setInterval(refreshDm,3000)}async function refreshDm(){if(!currentDm)return;var data=await api('direct_messages',{select:'sender_name,sender_device,body',room_id:'eq.'+currentDm.room,order:'created_at.asc',limit:'80'});dmBox.innerHTML=data.map(m=>'<div class="msg '+(m.sender_device==dev()?'me':'')+'"><b>'+esc(m.sender_name)+':</b> '+esc(m.body)+'</div>').join('');dmBox.scrollTop=dmBox.scrollHeight}async function sendDm(){var p=getProfile();await api('direct_messages',{}, {method:'POST',headers:{Prefer:'return=minimal'},body:{room_id:currentDm.room,venue_id:selected?selected.id:'direct',sender_device:dev(),sender_name:p.name||'Onur',body:dmText.value}});dmText.value='';refreshDm()}window.startDm=startDm;window.openDm=openDm;window.sendDm=sendDm;async function refreshLive(){var data=await api('chat_room_messages',{select:'sender_name,sender_device,body',room_id:'eq.cesme-test',order:'created_at.asc',limit:'80'});liveBox.innerHTML=data.map(m=>'<div class="msg '+(m.sender_device==dev()?'me':'')+'"><b>'+esc(m.sender_name)+':</b> '+esc(m.body)+'</div>').join('')}async function sendLive(){var p=getProfile();await api('chat_room_messages',{}, {method:'POST',headers:{Prefer:'return=minimal'},body:{room_id:'cesme-test',sender_name:liveName.value||p.name||'Onur',sender_device:dev(),body:liveText.value}});liveText.value='';refreshLive()}window.refreshLive=refreshLive;window.sendLive=sendLive;function saveProfile(){var p={name:name.value,age:age.value,height:height.value,weight:weight.value,bio:bio.value,interests:interests.value,photoUrl:photoUrl.value};localStorage.profile=JSON.stringify(p);profileSaved.className='ok';profileSaved.innerHTML='Profil kaydedildi ✅';ensureProfile().catch(function(){})}window.saveProfile=saveProfile;try{var p=getProfile();name.value=p.name||'';age.value=p.age||'';height.value=p.height||'';weight.value=p.weight||'';bio.value=p.bio||'';interests.value=p.interests||'';photoUrl.value=p.photoUrl||'';liveName.value=p.name||'Onur'}catch(e){}loadVenues();</script></body></html>
