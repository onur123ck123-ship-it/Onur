<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ÇeşmeAşk</title><style>*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#dff7ff,#fff7ed);color:#082f49}#app{max-width:560px;margin:auto;padding:18px 14px 96px}.top{display:flex;justify-content:space-between;align-items:center;margin:18px 0}.brand{font-size:38px;font-weight:950;margin:0}.eyebrow{margin:0;color:#64748b;font-weight:800}.logo{width:56px;height:56px;border-radius:18px;background:#0ea5e9;color:white;display:grid;place-items:center;font-size:28px;box-shadow:0 14px 30px #0284c733}.card{background:#ffffffee;border:1px solid #fff;border-radius:28px;padding:20px;margin:12px 0;box-shadow:0 18px 46px #07598524}.hero{background:linear-gradient(135deg,#fff,#ecfeff)}h2{font-size:28px;margin-top:0}.muted{color:#64748b;line-height:1.45}.btn{width:100%;border:0;border-radius:18px;padding:15px;margin-top:10px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:white;font-weight:950;font-size:16px}.btn.light{background:#eff6ff;color:#075985}.btn.red{background:#fee2e2;color:#991b1b}.row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;text-align:center;padding:12px}.stat b{display:block;font-size:22px}.venue{width:100%;display:flex;gap:12px;align-items:center;text-align:left;border:1px solid #e2e8f0;background:white;border-radius:22px;padding:14px;margin:9px 0}.emoji{width:50px;height:50px;border-radius:18px;background:#e0f2fe;display:grid;place-items:center;font-size:26px}.right{margin-left:auto;text-align:right;color:#0e7490;font-weight:950;font-size:12px}.tabs{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:min(540px,calc(100% - 18px));display:grid;grid-template-columns:repeat(5,1fr);gap:5px;background:#ffffffdf;padding:8px;border-radius:24px;box-shadow:0 12px 35px #07598530}.tab{border:0;border-radius:16px;padding:10px 2px;background:transparent;color:#64748b;font-weight:950;font-size:12px}.tab.on{background:#dff6ff;color:#075985}.person{min-height:420px;border-radius:30px;background:linear-gradient(160deg,#0ea5e9,#fb923c);color:white;padding:22px;display:flex;flex-direction:column;justify-content:flex-end;box-shadow:0 18px 48px #07598530}.pill{display:inline-block;background:#ffffff35;border-radius:999px;padding:7px 10px;margin:4px 4px 0 0;font-size:12px;font-weight:900}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.round{border:0;border-radius:22px;background:white;padding:18px;font-size:28px;box-shadow:0 10px 25px #07598520}.msg{background:#f8fafc;border-radius:16px;padding:12px;margin:8px 0}.me{background:#dff6ff;margin-left:40px}input{width:100%;border:1px solid #cbd5e1;border-radius:16px;padding:13px;margin-top:6px}label{display:block;margin:10px 0;font-weight:850}.ok{background:#dcfce7;color:#166534;border-radius:16px;padding:12px;font-weight:950}.warn{background:#fff7ed;color:#9a3412;border-radius:16px;padding:12px;font-weight:950}.bad{background:#fee2e2;color:#991b1b;border-radius:16px;padding:12px;font-weight:950}.livebox{max-height:360px;overflow:auto;background:#f8fafc;border-radius:18px;padding:10px}</style></head><body><div id="app"></div><nav id="tabs" class="tabs"></nav><script>var tab='mekan',timer=null;var me=JSON.parse(localStorage.me||'null'),check=JSON.parse(localStorage.check||'null'),match=JSON.parse(localStorage.match||'null'),msgs=JSON.parse(localStorage.msgs||'[]');var API='https://bztigwfnenwosulhxrxo.supabase.co/rest/v1/';var KEY='sb_publishable_P76ca2ta_N7PWpA_Wm6lTw__DEzK19l';var venues=[['starbucks','Starbucks Ilıca','Ilıca','Kahve','☕',2],['alacati','Alaçatı Çarşı','Alaçatı','Gezi','🧿',1],['marina','Çeşme Marina','Merkez','Marina','⛵',0],['before','Before Sunset','Ovacık','Beach','🌅',1],['ayayorgi','Aya Yorgi','Ayayorgi','Beach','🌙',0]];var people=[['ada','Ada',20,'Kahve + deniz + sakin sohbet.','starbucks',['kahve','deniz','müzik']],['lara','Lara',21,'Çeşme planı spontane olur.','starbucks',['beach','tatlı','foto']],['mira','Mira',19,'Alaçatıdayım, komik açılışlara varım.','alacati',['dans','kahve','gezi']],['selin','Selin',21,'Önce chat, sonra belki selam.','before',['deniz','lofi','sohbet']]];function E(s){return String(s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}function H(){return '<div class="top"><div><p class="eyebrow">Çeşme sosyal check-in</p><h1 class="brand">ÇeşmeAşk</h1></div><div class="logo">💙</div></div>'}function T(){var a=[['mekan','📍 Mekân'],['kesfet','💫 Keşfet'],['chat','💬 Chat'],['canli','⚡ Canlı'],['profil','👤 Profil']],h='';a.forEach(function(x){h+='<button class="tab '+(tab==x[0]?'on':'')+'" onclick="go(\''+x[0]+'\')">'+x[1]+'</button>'});document.getElementById('tabs').innerHTML=h}function S(){return '<div class="ok">Tek site çalışıyor · canlı sekme hazır</div>'}function draw(){T();if(!me&&tab!='canli')return onboard();if(tab=='mekan')return mekan();if(tab=='kesfet')return kesfet();if(tab=='chat')return chat();if(tab=='canli')return live();profil()}function go(t){if(timer){clearInterval(timer);timer=null}tab=t;draw()}window.go=go;function onboard(){app.innerHTML=H()+'<article class="card hero"><h2>Aynı mekândasınız. Tanışmak karşılıklıysa başlasın.</h2><p class="muted">Tek site sürümü. Demo + canlı chat aynı yerde.</p>'+S()+'<label>Ad<input id="ad" placeholder="Onur"></label><label>Yaş<input id="yas" type="number" placeholder="19"></label><button class="btn" onclick="start()">Başla</button><button class="btn light" onclick="go(\'canli\')">Direkt canlı chat testine git</button></article>'}function start(){me={name:ad.value||'Onur',age:yas.value||'19',bio:'Çeşmedeyim, iyi sohbet iyi gider.'};localStorage.me=JSON.stringify(me);tab='mekan';draw()}window.start=start;function mekan(){var total=venues.reduce(function(a,v){return a+v[5]},0),hot=venues[0];var h=H()+'<article class="card"><h2>Bugün nerdesin?</h2><p class="muted">Mekân seç, aynı yerdeki demo kişileri gör.</p>'+S()+'<div class="row"><div class="stat"><b>'+total+'</b>kişi</div><div class="stat"><b>'+venues.length+'</b>mekân</div><div class="stat"><b>'+hot[1]+'</b>hot</div></div>'+(check?'<p class="ok">Check-in: '+E(check.name)+'</p><button class="btn red" onclick="endCheck()">Check-in bitir</button>':'<p class="warn">Aktif check-in yok.</p>')+'</article>';venues.forEach(function(v){h+='<button class="venue" onclick="ci(\''+v[0]+'\')"><span class="emoji">'+v[4]+'</span><span><b>'+v[1]+'</b><br><small>'+v[2]+' · '+v[3]+'</small></span><span class="right">'+v[5]+' kişi<br>Demo</span></button>'});app.innerHTML=h}function ci(id){var v=venues.find(function(x){return x[0]==id});check={id:v[0],name:v[1]};localStorage.check=JSON.stringify(check);tab='kesfet';draw()}window.ci=ci;function endCheck(){check=null;localStorage.removeItem('check');draw()}window.endCheck=endCheck;function cands(){if(!check)return[];var seen=JSON.parse(localStorage.seen||'[]');return people.filter(function(p){return p[4]==check.id&&seen.indexOf(p[0])<0})}function kesfet(){if(!check){app.innerHTML=H()+'<article class="card"><h2>Önce mekâna check-in yap</h2><button class="btn" onclick="go(\'mekan\')">Mekân seç</button></article>';return}var a=cands();if(!a.length){app.innerHTML=H()+'<article class="card"><h2>Bu mekânda yeni kişi yok</h2><p class="muted">Demo için Starbucks Ilıca seç veya görülenleri sıfırla.</p><button class="btn" onclick="go(\'mekan\')">Mekân değiştir</button><button class="btn light" onclick="localStorage.removeItem(\'seen\');draw()">Görülenleri sıfırla</button></article>';return}var p=a[0],tags=p[5].map(function(t){return '<span class="pill">'+t+'</span>'}).join('');app.innerHTML=H()+'<section class="person"><h2>'+p[1]+', '+p[2]+'</h2><p>'+p[3]+'</p><div>'+tags+'</div></section><div class="actions"><button class="round" onclick="sw(\''+p[0]+'\',0)">❌</button><button class="round" onclick="sw(\''+p[0]+'\',1)">💙</button></div>'}function sw(id,like){var seen=JSON.parse(localStorage.seen||'[]');if(seen.indexOf(id)<0)seen.push(id);localStorage.seen=JSON.stringify(seen);var p=people.find(function(x){return x[0]==id});if(like){match={person:p};msgs=[{from:p[0],body:'Selam, aynı mekândayız sanırım 😄'}];localStorage.match=JSON.stringify(match);localStorage.msgs=JSON.stringify(msgs);alert('Match oldu!');tab='chat'}draw()}window.sw=sw;function chat(){if(!match){app.innerHTML=H()+'<article class="card"><h2>Henüz match yok</h2><p class="muted">Keşfet ekranında like atınca demo chat açılır. Gerçek iki telefon testi için Canlı sekmesini aç.</p><button class="btn" onclick="go(\'kesfet\')">Keşfet</button><button class="btn light" onclick="go(\'canli\')">Canlı chat testine geç</button></article>';return}var p=match.person;var m=msgs.map(function(x){return '<div class="msg '+(x.from=='me'?'me':'')+'">'+E(x.body)+'</div>'}).join('');app.innerHTML=H()+'<article class="card"><h2>'+p[1]+' ile demo chat</h2>'+m+'<label>Mesaj<input id="mes" placeholder="Selam"></label><button class="btn" onclick="send()">Gönder</button><button class="btn light" onclick="go(\'canli\')">Canlı chat testine geç</button></article>'}function send(){if(!mes.value.trim())return;msgs.push({from:'me',body:mes.value.trim()});localStorage.msgs=JSON.stringify(msgs);draw()}window.send=send;function profil(){app.innerHTML=H()+'<article class="card"><h2>'+E(me.name)+', '+E(me.age)+'</h2><p class="muted">'+E(me.bio)+'</p><p class="ok">Profil demo modda kayıtlı.</p><button class="btn red" onclick="localStorage.clear();location.reload()">Sıfırla</button></article>'}async function rq(path,params,opt){var u=new URL(API+path);Object.keys(params||{}).forEach(function(k){u.searchParams.set(k,params[k])});var c=new AbortController();var to=setTimeout(function(){c.abort()},5000);var r=await fetch(u,{method:(opt&&opt.method)||'GET',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json',...((opt&&opt.headers)||{})},body:(opt&&opt.body)?JSON.stringify(opt.body):undefined,signal:c.signal});clearTimeout(to);var tx=await r.text();var d=tx?JSON.parse(tx):null;if(!r.ok)throw new Error((d&&d.message)||tx||r.statusText);return d}function live(){var n=(me&&me.name)||localStorage.liveName||'Onur';app.innerHTML=H()+'<article class="card hero"><h2>Canlı Chat Testi</h2><p class="muted">Bu oda Supabase DB’ye yazar. İki telefonda aynı siteyi açıp Canlı sekmesine girin.</p><div id="liveStatus" class="warn">Bağlanıyor...</div><label>İsim<input id="liveName" value="'+E(n)+'"></label><div id="liveMsgs" class="livebox">Mesajlar yükleniyor...</div><label>Mesaj<input id="liveInput" placeholder="Selam canlı test"></label><button class="btn" onclick="sendLive()">Canlı gönder</button><button class="btn light" onclick="refreshLive()">Yenile</button></article>';refreshLive();timer=setInterval(refreshLive,3000)}async function refreshLive(){var box=document.getElementById('liveMsgs'),st=document.getElementById('liveStatus');if(!box)return;try{var data=await rq('chat_room_messages',{select:'*',room_id:'eq.cesme-test',order:'created_at.asc',limit:'60'});st.className='ok';st.textContent='Canlı DB bağlı ✅ Mesajlar otomatik yenileniyor';box.innerHTML=(data||[]).map(function(m){var own=(m.sender_name==(document.getElementById('liveName')?.value||''));return '<div class="msg '+(own?'me':'')+'"><b>'+E(m.sender_name)+':</b> '+E(m.body)+'</div>'}).join('')||'<p class="muted">Henüz mesaj yok. İlk mesajı at.</p>';box.scrollTop=box.scrollHeight}catch(e){st.className='bad';st.textContent='Canlı DB hatası: '+e.message;box.innerHTML='<p class="muted">Bağlantı hatası. Tekrar dene.</p>'}}async function sendLive(){var name=document.getElementById('liveName').value.trim()||'Onur';var body=document.getElementById('liveInput').value.trim();if(!body)return;localStorage.liveName=name;try{await rq('chat_room_messages',{}, {method:'POST',headers:{Prefer:'return=minimal'},body:{room_id:'cesme-test',sender_name:name,body:body}});document.getElementById('liveInput').value='';refreshLive()}catch(e){alert('Gönderilemedi: '+e.message)}}window.refreshLive=refreshLive;window.sendLive=sendLive;draw();</script></body></html>
