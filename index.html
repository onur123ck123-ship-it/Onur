<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ÇeşmeAşk</title><style>*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#dff7ff,#fff7ed);color:#082f49}#app{max-width:560px;margin:auto;padding:18px 14px 100px}.top{display:flex;justify-content:space-between;align-items:center;margin:16px 0}.brand{font-size:36px;font-weight:950;margin:0}.eyebrow{margin:0;color:#64748b;font-weight:800}.logo{width:56px;height:56px;border-radius:20px;background:linear-gradient(135deg,#0ea5e9,#fb923c);color:white;display:grid;place-items:center;font-size:28px}.card{background:#ffffffed;border-radius:28px;padding:18px;margin:12px 0;box-shadow:0 18px 46px #07598524}h2{font-size:27px;margin:0 0 8px}.muted{color:#64748b;line-height:1.45}.btn{width:100%;border:0;border-radius:18px;padding:14px;margin-top:10px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:white;font-weight:950;font-size:16px}.light{background:#eff6ff;color:#075985}.red{background:#fee2e2;color:#991b1b}.tabs{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:min(540px,calc(100% - 18px));display:grid;grid-template-columns:repeat(5,1fr);gap:5px;background:#ffffffdf;padding:8px;border-radius:24px;box-shadow:0 12px 35px #07598530}.tab{border:0;border-radius:16px;padding:10px 2px;background:transparent;color:#64748b;font-weight:950;font-size:12px}.tab.on{background:#dff6ff;color:#075985}.venue,.personrow{width:100%;display:flex;gap:12px;align-items:center;text-align:left;border:1px solid #e2e8f0;background:white;border-radius:22px;padding:14px;margin:9px 0}.emoji{width:50px;height:50px;border-radius:18px;background:#e0f2fe;display:grid;place-items:center;font-size:26px}.right{margin-left:auto;text-align:right;color:#0e7490;font-weight:950;font-size:12px}.ok{background:#dcfce7;color:#166534;border-radius:16px;padding:12px;font-weight:950}.warn{background:#fff7ed;color:#9a3412;border-radius:16px;padding:12px;font-weight:950}.bad{background:#fee2e2;color:#991b1b;border-radius:16px;padding:12px;font-weight:950}input,textarea,select{width:100%;border:1px solid #cbd5e1;border-radius:16px;padding:13px;margin-top:6px;font:inherit}label{display:block;margin:10px 0;font-weight:850}.map{height:430px;border-radius:30px;position:relative;overflow:hidden;background:radial-gradient(circle at 20% 20%,#e0f2fe 0 16%,transparent 17%),linear-gradient(135deg,#bfdbfe 0 28%,#ecfeff 28% 45%,#fde68a 45% 54%,#bae6fd 54% 100%);border:3px solid #fff;box-shadow:0 18px 46px #07598524}.map:before{content:'ÇEŞME CANLI HARİTA';position:absolute;left:16px;top:14px;background:#ffffffd9;border-radius:999px;padding:8px 12px;font-weight:950;color:#075985;font-size:12px}.sea{position:absolute;right:-90px;top:-40px;width:250px;height:520px;border-radius:50%;background:#38bdf855;transform:rotate(-12deg)}.road{position:absolute;left:10%;top:52%;width:82%;height:5px;border-radius:10px;background:#ffffffb0;transform:rotate(-18deg)}.pin{position:absolute;transform:translate(-50%,-50%);border:0;background:transparent;text-align:center}.bubble{min-width:54px;border-radius:18px;background:white;padding:6px 8px;box-shadow:0 8px 20px #07598535;border:2px solid #bae6fd}.bubble b{display:block;font-size:18px}.bubble small{display:block;max-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:10px;font-weight:900;color:#075985}.count{position:absolute;right:-6px;top:-8px;background:#ef4444;color:white;border-radius:999px;min-width:23px;height:23px;padding:3px;font-size:12px;font-weight:950}.msg{background:#f8fafc;border-radius:16px;padding:12px;margin:8px 0}.me{background:#dff6ff;margin-left:40px}.del{border:0;background:#fee2e2;color:#991b1b;border-radius:10px;padding:6px 8px;font-weight:900;margin-left:8px;float:right}.livebox{max-height:340px;overflow:auto;background:#f8fafc;border-radius:18px;padding:10px}</style></head><body><div id="app"></div><nav id="tabs" class="tabs"></nav><script>var tab='harita',timer=null,venues=[],check=JSON.parse(localStorage.check||'null'),me=JSON.parse(localStorage.me||'null'),people=[];var API='https://bztigwfnenwosulhxrxo.supabase.co/rest/v1/';var KEY='sb_publishable_P76ca2ta_N7PWpA_Wm6lTw__DEzK19l';function dev(){var d=localStorage.ca_device;if(!d){d='dev_'+Math.random().toString(36).slice(2)+'_'+Date.now();localStorage.ca_device=d}return d}function E(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function H(){return '<div class="top"><div><p class="eyebrow">Çeşme canlı sosyal harita</p><h1 class="brand">ÇeşmeAşk</h1></div><div class="logo">💙</div></div>'}function T(){var a=[['harita','🗺️ Harita'],['mekan','📍 Yerler'],['kesfet','💫 Keşfet'],['canli','⚡ Chat'],['profil','👤 Profil']],h='';a.forEach(x=>h+='<button class="tab '+(tab==x[0]?'on':'')+'" onclick="go(\''+x[0]+'\')">'+x[1]+'</button>');tabs.innerHTML=h}function draw(){T();if(!me&&tab!='profil')return profil(true);if(tab=='harita')return harita();if(tab=='mekan')return mekan();if(tab=='kesfet')return kesfet();if(tab=='canli')return live();profil()}function go(t){if(timer){clearInterval(timer);timer=null}tab=t;draw()}window.go=go;async function rq(path,params,opt){var u=new URL(API+path);Object.keys(params||{}).forEach(k=>u.searchParams.set(k,params[k]));var c=new AbortController(),to=setTimeout(()=>c.abort(),6000);var r=await fetch(u,{method:(opt&&opt.method)||'GET',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json',...((opt&&opt.headers)||{})},body:(opt&&opt.body)?JSON.stringify(opt.body):undefined,signal:c.signal});clearTimeout(to);var tx=await r.text(),d=tx?JSON.parse(tx):null;if(!r.ok)throw new Error((d&&d.message)||tx||r.statusText);return d}async function loadVenues(){venues=await rq('rpc/venues_with_counts',{}, {method:'POST'});return venues}function xy(v){var minLat=38.235,maxLat=38.37,minLng=26.22,maxLng=26.40;var x=(v.lng-minLng)/(maxLng-minLng)*100;var y=(maxLat-v.lat)/(maxLat-minLat)*100;return [Math.max(7,Math.min(93,x)),Math.max(9,Math.min(91,y))]}async function harita(){app.innerHTML=H()+'<article class="card"><h2>Canlı Çeşme Haritası</h2><p class="warn">Harita ve canlı sayılar yükleniyor...</p></article>';try{await loadVenues();var pins='';venues.forEach(v=>{var p=xy(v);pins+='<button class="pin" style="left:'+p[0]+'%;top:'+p[1]+'%" onclick="selectVenue(\''+v.id+'\')"><span class="bubble"><b>'+E(v.emoji||'📍')+'</b><small>'+E(v.name)+'</small></span><span class="count">'+(v.live_count||0)+'</span></button>'});app.innerHTML=H()+'<article class="card"><h2>Canlı Çeşme Haritası</h2><p class="muted">Noktalar gerçek mekânlar. Kırmızı sayı o anki canlı check-in.</p>'+(check?'<p class="ok">Şu an: '+E(check.name)+'</p>':'<p class="warn">Henüz check-in yok.</p>')+'</article><div class="map"><div class="sea"></div><div class="road"></div>'+pins+'</div><article class="card"><button class="btn" onclick="go(\'mekan\')">Listeye geç / yeni yer ekle</button></article>'}catch(e){app.innerHTML=H()+'<article class="card"><h2>Harita hata</h2><p class="bad">'+E(e.message)+'</p></article>'}}window.selectVenue=function(id){var v=venues.find(x=>x.id==id); if(v) ci(v)};async function mekan(){app.innerHTML=H()+'<article class="card"><h2>Gerçek Yerler</h2><p class="warn">Yerler yükleniyor...</p></article>';try{await loadVenues();var h=H()+'<article class="card"><h2>Gerçek Yerler</h2><p class="muted">Sayılar yapay değil; aktif check-in sayısı.</p><button class="btn light" onclick="addVenueForm()">+ Yeni yer ekle</button></article>';venues.forEach(v=>h+='<button class="venue" onclick="ciById(\''+v.id+'\')"><span class="emoji">'+E(v.emoji||'📍')+'</span><span><b>'+E(v.name)+'</b><br><small>'+E(v.area||'Çeşme')+' · '+E(v.category||'Mekân')+(v.is_user_added?' · Kullanıcı ekledi':'')+'</small></span><span class="right">'+(v.live_count||0)+' kişi<br>canlı</span></button>');app.innerHTML=h}catch(e){app.innerHTML=H()+'<article class="card"><h2>Yerler hata</h2><p class="bad">'+E(e.message)+'</p></article>'}}window.ciById=function(id){var v=venues.find(x=>x.id==id);if(v)ci(v)};async function ci(v){try{await rq('rpc/device_checkin',{}, {method:'POST',body:{p_device_id:dev(),p_venue_id:v.id}});check={id:v.id,name:v.name};localStorage.check=JSON.stringify(check);alert(v.name+' check-in tamam ✅');tab='kesfet';draw()}catch(e){alert('Check-in olmadı: '+e.message)}}function addVenueForm(){app.innerHTML=H()+'<article class="card"><h2>Yeni Yer Ekle</h2><p class="muted">Konumu yaklaşık gir. Sonra bunu telefondan “konumumdan al” yaparız.</p><label>Yer adı<input id="vn" placeholder="Örn: Yeni beach"></label><label>Bölge<input id="va" placeholder="Örn: Ilıca"></label><label>Kategori<select id="vc"><option>Beach</option><option>Kahve</option><option>Yemek</option><option>Bar</option><option>Gezi</option><option>Marina</option></select></label><label>Emoji<input id="ve" value="📍"></label><label>Enlem lat<input id="vlat" type="number" step="0.0001" placeholder="38.30"></label><label>Boylam lng<input id="vlng" type="number" step="0.0001" placeholder="26.32"></label><button class="btn" onclick="saveVenue()">Yeri ekle</button><button class="btn light" onclick="go(\'mekan\')">Vazgeç</button></article>'}window.addVenueForm=addVenueForm;async function saveVenue(){try{var name=vn.value.trim();if(!name)return alert('Ad yaz');var lat=parseFloat(vlat.value),lng=parseFloat(vlng.value);if(!lat||!lng)return alert('Lat/lng gir');await rq('rpc/add_user_venue',{}, {method:'POST',body:{p_device_id:dev(),p_name:name,p_area:va.value||'Çeşme',p_category:vc.value||'Mekân',p_emoji:ve.value||'📍',p_lat:lat,p_lng:lng}});alert('Yer eklendi ✅');tab='harita';draw()}catch(e){alert('Eklenemedi: '+e.message)}}window.saveVenue=saveVenue;async function saveProfile(){var n=pname.value.trim()||'Onur',a=parseInt(page.value||'19',10),b=pbio.value.trim()||'Çeşmedeyim, iyi sohbet iyi gider.';try{var p=await rq('rpc/upsert_device_profile',{}, {method:'POST',body:{p_device_id:dev(),p_display_name:n,p_age:a,p_bio:b}});me={name:p.display_name||n,age:p.age||a,bio:p.bio||b};localStorage.me=JSON.stringify(me);alert('Profil kaydedildi ✅');tab='harita';draw()}catch(e){alert('Profil kaydedilemedi: '+e.message)}}window.saveProfile=saveProfile;function profil(first){var n=(me&&me.name)||'',a=(me&&me.age)||'',b=(me&&me.bio)||'';app.innerHTML=H()+'<article class="card"><h2>'+(first?'Profil oluştur':'Profil')+'</h2><p class="muted">Canlı haritada ve check-in sisteminde bu profil kullanılır.</p><label>Ad<input id="pname" value="'+E(n)+'" placeholder="Onur"></label><label>Yaş<input id="page" type="number" value="'+E(a)+'" placeholder="19"></label><label>Bio<textarea id="pbio" rows="3">'+E(b)+'</textarea></label><button class="btn" onclick="saveProfile()">Profili kaydet</button><button class="btn red" onclick="localStorage.clear();location.reload()">Bu cihazı sıfırla</button></article>'}async function kesfet(){if(!check){app.innerHTML=H()+'<article class="card"><h2>Önce haritadan/yerlerden check-in yap</h2><button class="btn" onclick="go(\'harita\')">Haritaya git</button></article>';return}app.innerHTML=H()+'<article class="card"><h2>'+E(check.name)+'</h2><p class="warn">Aynı mekândaki kişiler yükleniyor...</p></article>';try{people=await rq('rpc/people_at_venue',{}, {method:'POST',body:{p_venue_id:check.id,p_my_device:dev()}});var h=H()+'<article class="card"><h2>'+E(check.name)+'</h2>'+(people.length?'<p class="ok">'+people.length+' gerçek kişi bulundu ✅</p>':'<p class="warn">Şimdilik başka kimse yok. İkinci telefondan aynı yere check-in yap.</p>')+'</article>';people.forEach((p,i)=>h+='<button class="personrow" onclick="openPerson('+i+')"><span class="emoji">👤</span><span><b>'+E(p.display_name)+', '+E(p.age||'')+'</b><br><small>'+E(p.bio||'Bio yok')+'</small></span><span class="right">Canlı<br>kişi</span></button>');app.innerHTML=h}catch(e){app.innerHTML=H()+'<article class="card"><h2>Keşfet hata</h2><p class="bad">'+E(e.message)+'</p></article>'}}function openPerson(i){localStorage.currentChat=JSON.stringify(people[i]);tab='canli';draw()}window.openPerson=openPerson;function live(){var n=(me&&me.name)||localStorage.liveName||'Onur';app.innerHTML=H()+'<article class="card"><h2>Canlı Test Chat</h2><p class="muted">Genel test odası. Match özel chat sonraki adım.</p><div id="liveStatus" class="warn">Bağlanıyor...</div><label>İsim<input id="liveName" value="'+E(n)+'"></label><div id="liveMsgs" class="livebox">Mesajlar yükleniyor...</div><label>Mesaj<input id="liveInput" placeholder="Selam"></label><button class="btn" onclick="sendLive()">Gönder</button><button class="btn light" onclick="refreshLive()">Yenile</button></article>';refreshLive();timer=setInterval(refreshLive,3000)}async function refreshLive(){var box=document.getElementById('liveMsgs'),st=document.getElementById('liveStatus');if(!box)return;try{var data=await rq('chat_room_messages',{select:'id,sender_name,sender_device,body,created_at',room_id:'eq.cesme-test',order:'created_at.asc',limit:'60'});var my=dev();st.className='ok';st.textContent='Canlı DB bağlı ✅';box.innerHTML=(data||[]).map(m=>{var own=m.sender_device==my;return '<div class="msg '+(own?'me':'')+'"><b>'+E(m.sender_name)+':</b> '+E(m.body)+(own?'<button class="del" onclick="deleteLive(\''+m.id+'\')">Sil</button>':'')+'</div>'}).join('')||'<p class="muted">Henüz mesaj yok.</p>';box.scrollTop=box.scrollHeight}catch(e){st.className='bad';st.textContent='Canlı DB hatası: '+e.message}}async function sendLive(){var name=liveName.value.trim()||'Onur',body=liveInput.value.trim();if(!body)return;localStorage.liveName=name;try{await rq('chat_room_messages',{}, {method:'POST',headers:{Prefer:'return=minimal'},body:{room_id:'cesme-test',sender_name:name,sender_device:dev(),body:body}});liveInput.value='';refreshLive()}catch(e){alert('Gönderilemedi: '+e.message)}}async function deleteLive(id){if(!confirm('Kendi mesajın silinsin mi?'))return;try{var ok=await rq('rpc/delete_own_chat_message',{}, {method:'POST',body:{p_message_id:id,p_sender_device:dev()}});if(!ok)alert('Bu mesaj bu cihaza ait değil.');refreshLive()}catch(e){alert('Silinemedi: '+e.message)}}window.refreshLive=refreshLive;window.sendLive=sendLive;window.deleteLive=deleteLive;draw();</script></body></html>
