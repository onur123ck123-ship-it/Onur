<!doctype html><html lang=tr><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1,viewport-fit=cover'><title>ÇeşmeAşk</title><link rel=stylesheet href=https://unpkg.com/leaflet@1.9.4/dist/leaflet.css><style>
:root{--a:#0ea5e9;--b:#f97316;--bg:#eef8ff;--t:#062033;--m:#638092;--l:#d7edf7;--s:0 18px 50px #0f5c8024}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:radial-gradient(circle at 15% 0,#b8efff,transparent 34%),linear-gradient(#fff,var(--bg));color:var(--t)}button,input,textarea,select{font:inherit}button{border:0}main{width:min(560px,100%);margin:auto;padding:18px 14px 96px}.top{display:flex;justify-content:space-between;align-items:center}.ey{font-size:12px;color:var(--m);font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin:0}h1{margin:0;font-size:30px}h2{font-size:30px;line-height:1;margin:0 0 10px}.card{background:#fffffff0;border:1px solid #fff;border-radius:28px;box-shadow:var(--s);padding:20px;margin:12px 0}.btn,.bad,.ghost,.mini{width:100%;padding:14px;border-radius:18px;font-weight:900}.btn{background:linear-gradient(135deg,var(--a),#06b6d4);color:#fff}.ghost{background:#f2f8fb;color:#33586a}.bad{background:#fee2e2;color:#991b1b}.mini{width:auto;background:#eef8ff;color:#075985}input,textarea,select{width:100%;border:1px solid var(--l);border-radius:16px;background:#f8fdff;padding:13px;margin-top:6px}.form{display:grid;gap:12px}.tabs{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:min(548px,calc(100% - 18px));display:grid;grid-template-columns:repeat(6,1fr);gap:5px;background:#ffffffe6;border-radius:24px;padding:8px;box-shadow:var(--s)}.tab{border-radius:16px;background:transparent;padding:9px 2px;font-size:10px;font-weight:900;color:var(--m)}.tab.on{background:#e0f5ff;color:#075985}.status{padding:12px;border-radius:16px;background:#e8fff7;color:#047857;font-weight:900}.warn{background:#fff7ed;color:#c2410c}.info{background:#eff6ff;color:#1d4ed8}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:#f8fdff;border:1px solid var(--l);border-radius:16px;text-align:center;padding:10px}.stat b{font-size:20px;display:block}.chips{display:flex;gap:8px;overflow:auto;margin:10px 0}.chip{white-space:nowrap;border-radius:99px;background:#ecf8ff;color:#12607e;padding:9px 12px;font-size:12px;font-weight:900}.chip.on{background:var(--a);color:white}.grid{display:grid;gap:12px}.venue,.chat{display:flex;gap:12px;align-items:center;padding:14px;border:1px solid var(--l);border-radius:22px;background:white;text-align:left}.emoji{width:50px;height:50px;border-radius:18px;background:#e0f7ff;display:grid;place-items:center;font-size:25px}.right{margin-left:auto;text-align:right;font-size:12px;font-weight:900;color:#12607e}.map{height:310px;border-radius:24px;overflow:hidden}.pcard{position:relative;min-height:540px;border-radius:32px;overflow:hidden;box-shadow:var(--s);display:flex;align-items:flex-end;background:#0ea5e9;color:white}.pcard:before{content:'';position:absolute;inset:0;background:linear-gradient(transparent 20%,#000b)}.photo{position:absolute;inset:0;background-size:cover;background-position:center}.pinfo{position:relative;padding:24px}.pill{display:inline-block;background:#edf8ff;color:#12607e;border-radius:99px;padding:7px 9px;margin:4px;font-size:12px;font-weight:800}.pcard .pill{background:#ffffff33;color:white}.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}.round{height:62px;border-radius:22px;background:white;font-size:28px;box-shadow:var(--s)}.like{color:#10b981}.nope{color:#ef4444}.msgbox{min-height:330px;background:#f6fcff;border:1px solid var(--l);border-radius:22px;padding:12px;display:flex;flex-direction:column;gap:8px}.msg{max-width:82%;padding:10px 12px;border-radius:16px;background:white}.me{align-self:flex-end;background:#dff6ff}.bot{align-self:flex-start}.sys{align-self:center;background:#eef8ff;color:var(--m);font-size:13px}.comp{display:grid;grid-template-columns:1fr 52px;gap:8px}.comp button{border-radius:16px;background:var(--a);color:white}.qa{display:grid;gap:8px}.qa button{padding:11px;border-radius:16px;background:#fff7ed;color:#9a3412;text-align:left;font-weight:800}.ans{white-space:pre-wrap;background:#f8fdff;border:1px solid var(--l);border-radius:20px;padding:14px}.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.hud div{background:white;border-radius:15px;text-align:center;padding:8px}canvas{width:100%;height:520px;border-radius:24px;background:linear-gradient(#7dd3fc 0 18%,#fde68a 18%);touch-action:none}.toast{position:fixed;left:50%;top:18px;transform:translateX(-50%);width:min(430px,calc(100% - 28px));background:#062033;color:white;border-radius:16px;padding:12px;z-index:5;text-align:center;font-weight:800}.hide{display:none}
</style></head><body><div id=toast class='toast hide'></div><main><div class=top><div><p class=ey>Çeşme sosyal check-in + AI</p><h1>ÇeşmeAşk</h1></div><button class=mini onclick='tab="profile";draw()'>⚙️</button></div><section id=screen></section></main><nav class=tabs id=tabs></nav><script src=https://unpkg.com/leaflet@1.9.4/dist/leaflet.js></script><script>
const V=[['starbucks-ilica','Starbucks Ilıca','Ilıca','Kahve','☕',[38.3259,26.3060]],['alacati-carsi','Alaçatı Çarşı','Alaçatı','Gezi','🧿',[38.2868,26.3776]],['cesme-marina','Çeşme Marina','Merkez','Marina','⛵',[38.3225,26.3066]],['before-sunset','Before Sunset','Ovacık','Beach','🌅',[38.2605,26.2979]],['fly-inn','Fly-Inn Beach','Altınkum','Beach','🪩',[38.3327,26.2416]],['ayayorgi','Aya Yorgi Koyu','Ayayorgi','Beach','🌙',[38.3117,26.2944]],['dutlu-kahve','Dutlu Kahve','Alaçatı','Kahve','🌳',[38.2894,26.3779]],['ilica-plaji','Ilıca Plajı','Ilıca','Beach','🏝️',[38.3217,26.3046]],['haci-memis','Hacımemiş','Alaçatı','Gezi','🍃',[38.2861,26.3809]],['cesme-kale','Çeşme Kalesi','Merkez','Gezi','🏰',[38.3216,26.3058]],['yildizburnu','Yıldızburnu','Ilıca','Sahil','⭐',[38.324,26.3027]],['cesme-carsi','Çeşme Çarşı','Merkez','Gezi','🛍️',[38.3217,26.3055]]].map(x=>({id:x[0],name:x[1],area:x[2],cat:x[3],em:x[4],xy:x[5]}));
const P=['https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=900&q=80','https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=900&q=80','https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=900&q=80','https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=900&q=80','https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=900&q=80'];
const U=[['u1','Ada','Kadın',20,'Kahve, deniz, akşam yürüyüşü. Doğal mesajları severim.',['kahve','deniz','müzik'],'starbucks-ilica',1,0],['u2','Lara','Kadın',20,'Beach sonrası kahve net. Komik açılışlara ekstra puan.',['beach','foto','tatlı'],'starbucks-ilica',1,1],['u3','Mira','Kadın',19,'Arkadaş grubuyla geldim, önce chat sonra selamlaşma.',['sohbet','dans','kahve'],'alacati-carsi',1,2],['u4','Ege','Erkek',21,'Marina tarafındayım. Tekne, müzik, chill.',['tekne','rap','gezi'],'cesme-marina',1,4],['u5','Selin','Kadın',21,'Dutlu Kahve’de sakin akşam. Kitap/kahve muhabbeti açılır.',['kitap','kahve','lofi'],'dutlu-kahve',1,3],['u6','Naz','Kadın',21,'Alaçatı kahve + tatlı için buradayım. Spontane ama saygılı.',['kahve','tatlı','müzik'],'alacati-carsi',1,0],['u7','Zeynep','Kadın',20,'Ilıca’da denizden çıktım, kahve arası. Çok hızlı numara isteme.',['deniz','kahve','foto'],'ilica-plaji',1,1],['u8','Bora','Erkek',23,'Altınkum beach, voleybol, müzik.',['spor','beach','müzik'],'fly-inn',0,4]].map(x=>({id:x[0],name:x[1],g:x[2],age:x[3],bio:x[4],ints:x[5],venue:x[6],like:x[7],photo:P[x[8]]}));
const S=(k,v)=>localStorage.setItem('ca_'+k,JSON.stringify(v)),L=(k,d=null)=>{try{return JSON.parse(localStorage.getItem('ca_'+k))??d}catch{return d}},$=s=>document.querySelector(s);let tab='venues',open=null,map,game,loopId;function me(){return L('me')}function ci(){let c=L('ci');return c&&Date.now()<c.exp?c:null}function st(id){let us=U.filter(u=>u.venue==id),m=ci()?.venue==id?1:0;return{t:us.length+m,w:us.filter(u=>u.g=='Kadın').length,e:us.filter(u=>u.g=='Erkek').length+m}}function top(){return [...V].sort((a,b)=>st(b.id).t-st(a.id).t)[0]}function say(x){toast.textContent=x;toast.classList.remove('hide');setTimeout(()=>toast.classList.add('hide'),1800)}function tabs(){tabs.innerHTML=[['venues','📍 Mekân'],['swipe','💫 Keşfet'],['matches','💬 Match'],['ai','🧠 AI'],['game','🎮 Oyun'],['profile','👤 Profil']].map(x=>`<button class='tab ${tab==x[0]?'on':''}' onclick='tab="${x[0]}";open=null;draw()'>${x[1]}</button>`).join('')}function draw(){if(loopId)cancelAnimationFrame(loopId);tabs(); if(!me())return onboard();({venues,swipe,matches,ai,game:gameScreen,profile})[tab]()}function onboard(){screen.innerHTML=`<div class=card><h2>Aynı mekândasınız. Tanışmak karşılıklıysa başlasın.</h2><p>ÇeşmeAşk tam konum göstermez; sadece seçtiğin mekâna check-in yapanları gösterir.</p><form class=form onsubmit='event.preventDefault();S("me",{name:n.value,age:a.value,bio:b.value||"Çeşme’deyim, iyi sohbet iyi gider.",phone:"",share:false});draw()'><label>Ad<input id=n required placeholder=Onur></label><label>Yaş<input id=a type=number min=18 required placeholder=19></label><label>Bio<textarea id=b placeholder='kahve + deniz + iyi sohbet'></textarea></label><button class=btn>Başla</button></form></div>`}
function venues(){let c=ci(),tv=top(),all=V.reduce((r,v)=>{let s=st(v.id);r.t+=s.t;r.w+=s.w;r.e+=s.e;return r},{t:0,w:0,e:0});screen.innerHTML=`<div class=card><h2>Bugün nerdesin?</h2><p>Haritada gerçek Çeşme mekânları; kullanıcıların tam konumu yok.</p><div class='status info'>🔥 En dolu: ${tv.name} · ${st(tv.id).t} kişi</div><div class=stats><div class=stat><b>${all.t}</b><span>Toplam</span></div><div class=stat><b>${all.w}</b><span>Kadın</span></div><div class=stat><b>${all.e}</b><span>Erkek</span></div></div>${c?`<div class=status>✅ ${V.find(v=>v.id==c.venue).name}</div><button class=bad onclick='S("ci",null);draw()'>Check-in’i bitir</button>`:`<div class='status warn'>Aktif check-in yok.</div>`}</div><div class=card><h3>Çeşme Haritası</h3><div id=map class=map></div></div><div class=grid>${V.map(v=>{let s=st(v.id);return`<button class=venue onclick='checkin("${v.id}")'><span class=emoji>${v.em}</span><span><b>${v.name}</b><br><small>${v.area} · ${v.cat}</small></span><span class=right>${s.t} kişi<br>♀ ${s.w} · ♂ ${s.e}</span></button>`}).join('')}</div>`;setTimeout(initMap,0)}function checkin(id){S('ci',{venue:id,exp:Date.now()+7200000});tab='swipe';say('Check-in yapıldı');draw()}function initMap(){if(!window.L)return;if(map)map.remove();map=L.map('map').setView([38.304,26.309],11);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);V.forEach(v=>{let s=st(v.id);L.marker(v.xy).addTo(map).bindPopup(`<b>${v.name}</b><br>${s.t} kişi · ♀ ${s.w} · ♂ ${s.e}<br><button onclick='checkin("${v.id}")'>Check-in</button>`)})}
function cand(){let c=ci();if(!c)return[];let seen=new Set(L('sw',[]).filter(x=>x.v==c.venue).map(x=>x.u));return U.filter(u=>u.venue==c.venue&&!seen.has(u.id))}function swipe(){if(!ci())return screen.innerHTML=`<div class=card><h2>Önce mekân seç</h2><button class=btn onclick='tab="venues";draw()'>Mekân seç</button></div>`;let u=cand()[0],v=V.find(v=>v.id==ci().venue);if(!u)return screen.innerHTML=`<div class=card><h2>Şimdilik bu kadar</h2><p>${v.name} için yeni profil kalmadı.</p><button class=btn onclick='tab="venues";draw()'>Mekân değiştir</button></div>`;screen.innerHTML=`<div class=card><h3>${v.name}</h3><p>Bu mekân: ♀ ${st(v.id).w} · ♂ ${st(v.id).e}</p></div><div class=pcard><div class=photo style='background-image:url(${u.photo})'></div><div class=pinfo><h2>${u.name}, ${u.age}</h2><p>${u.bio}</p>${u.ints.map(i=>`<span class=pill>${i}</span>`).join('')}</div></div><div class=actions><button class='round nope' onclick='dosw("${u.id}",0)'>✕</button><button class='round like' onclick='dosw("${u.id}",1)'>♥</button></div><button class=ghost onclick='say("${u.name}, ${v.name} seçimin iyiymiş 😄 Burada favorin ne?")'>AI açılış öner</button>`}function dosw(id,like){let c=ci(),u=U.find(x=>x.id==id),sw=L('sw',[]);sw.push({u:id,v:c.venue,like});S('sw',sw);if(like&&u.like){let ms=L('ms',[]);ms.unshift({id:'m'+Date.now(),u:id,v:c.venue});S('ms',ms);tab='matches';say('Match!')}draw()}
function matches(){if(open)return chat(open);let ms=L('ms',[]);screen.innerHTML=ms.length?`<div class=card><h2>Match’lerin</h2><p>Şimdilik demo chat; Supabase bağlanınca iki telefon gerçek yazışacak.</p></div><div class=grid>${ms.map(m=>{let u=U.find(x=>x.id==m.u),v=V.find(x=>x.id==m.v);return`<button class=chat onclick='open="${m.id}";draw()'><img src=${u.photo} style='width:52px;height:52px;border-radius:18px;object-fit:cover'><span><b>${u.name}</b><br><small>${v.name}</small></span></button>`}).join('')}</div>`:`<div class=card><h2>Henüz match yok</h2><button class=btn onclick='tab="swipe";draw()'>Keşfet</button></div>`}function chat(id){let m=L('ms',[]).find(x=>x.id==id),u=U.find(x=>x.id==m.u),all=L('msg',{});let th=all[id]||[{f:'sys',b:`${u.name} ile eşleştin. İlk mesajı sen at!`}];screen.innerHTML=`<div class=card><button class=ghost onclick='open=null;draw()'>← Dön</button><h2>${u.name}</h2><div class=msgbox>${th.map(x=>`<div class='msg ${x.f=="me"?"me":x.f=="sys"?"sys":"bot"}'>${x.b}</div>`).join('')}</div><form class=comp onsubmit='event.preventDefault();send("${id}",msg.value);msg.value=""'><input id=msg placeholder='Mesaj yaz...'><button>➤</button></form><button class=ghost onclick='msg.value="${u.name}, burada favorin ne?"'>AI öneri</button></div>`}function send(id,b){if(!b)return;let all=L('msg',{}),m=L('ms',[]).find(x=>x.id==id),u=U.find(x=>x.id==m.u);all[id]=[...(all[id]||[]),{f:'me',b},{f:'bot',b:b.toLowerCase().includes('numara')?'Numara için biraz erken olabilir 😄 önce enerjimiz tutuyor mu bakalım.':'Güzel mesaj 😄 Sen Çeşme’de en çok nereyi seviyorsun?'}];S('msg',all);chat(id)}
function ai(){let tv=top(),s=st(tv.id);screen.innerHTML=`<div class=card><h2>ÇeşmeAşk AI</h2><div class='status info'>${tv.name}: ${s.t} kişi · ♀ ${s.w} · ♂ ${s.e}</div><div class=qa><button onclick='ask("ne yazayım")'>Bu kıza ne yazayım?</button><button onclick='ask("kadın erkek")'>Kadın/erkek en iyi mekân?</button><button onclick='ask("profil")'>Profilimi düzelt</button></div><textarea id=q placeholder='Soru sor'></textarea><button class=btn onclick='ask(q.value)'>Sor</button><div id=ans class=ans>Hazırım 😄</div></div>`}function ask(q){let tv=top(),best=[...V].sort((a,b)=>st(b.id).w-st(a.id).w)[0];ans.textContent=q.includes('kadın')||q.includes('erkek')?`Kadın sayısı en iyi: ${best.name}. Mesajı mekân üstünden aç.`:q.includes('profil')?'Foto net olsun, bio kısa ve spesifik olsun. İlgi alanı 3-5 tane yeter.':`3 mesaj:\n1) “${tv.name} seçimin iyiymiş 😄 Burada favorin ne?”\n2) “Çeşme planın ne?”\n3) “Kasmadan iki dakika sohbet edelim mi?”`}
function gameScreen(){screen.innerHTML=`<div class=card><h2>Çeşme Beach Run</h2><p>3 şeritli mini oyun.</p><div class=hud><div><b id=sc>0</b><span>Skor</span></div><div><b id=be>${L('best',0)}</b><span>Rekor</span></div><div><b id=he>0</b><span>Kalp</span></div><div><b id=sp>1x</b><span>Hız</span></div></div><canvas id=cv width=420 height=520></canvas><div class=actions><button class=ghost onclick='mv(-1)'>←</button><button class=ghost onclick='mv(1)'>→</button></div><button class=btn onclick='start()'>Başlat</button></div>`;setup()}function setup(){let ctx=cv.getContext('2d');game={r:0,l:1,s:0,h:0,v:3,t:0,it:[],ctx};paint()}function paint(){let c=game.ctx;c.clearRect(0,0,420,520);c.fillStyle='#fde68a';c.fillRect(0,100,420,420);c.fillStyle='#7dd3fc';c.fillRect(0,0,420,100);c.font='34px serif';c.textAlign='center';game.it.forEach(i=>c.fillText(i.e,70+i.l*140,i.y));c.font='46px serif';c.fillText('🏃‍♂️',70+game.l*140,460)}function start(){game.r=1;run()}function run(){if(!game.r)return;game.t++;game.s+=game.v;if(game.t%45==0)game.it.push({l:Math.floor(Math.random()*3),y:0,e:Math.random()<.7?'⛱️':'💙'});game.it.forEach(i=>i.y+=game.v*2);game.it=game.it.filter(i=>i.y<540);for(let i of game.it)if(Math.abs(i.y-450)<25&&i.l==game.l){if(i.e=='💙'){game.h++;i.y=999}else{game.r=0;S('best',Math.max(L('best',0),Math.floor(game.s)));say('Oyun bitti')}}sc.textContent=Math.floor(game.s);he.textContent=game.h;sp.textContent=(game.v/3).toFixed(1)+'x';game.v+=.002;paint();loopId=requestAnimationFrame(run)}function mv(d){game.l=Math.max(0,Math.min(2,game.l+d));paint()}
function profile(){let p=me();screen.innerHTML=`<div class=card><h2>${p.name}, ${p.age}</h2><p>${p.bio}</p></div><div class=card><h3>Profili düzenle</h3><form class=form onsubmit='event.preventDefault();S("me",{...p,name:pn.value,age:pa.value,bio:pb.value,phone:pp.value,share:ps.checked});draw()'><label>Ad<input id=pn value='${p.name}'></label><label>Yaş<input id=pa value='${p.age}'></label><label>Bio<textarea id=pb>${p.bio}</textarea></label><label>Telefon<input id=pp value='${p.phone||''}'></label><label><input id=ps type=checkbox ${p.share?'checked':''}> Match olunca numaramı paylaşabilirim</label><button class=btn>Kaydet</button></form></div><button class=bad onclick='localStorage.clear();location.reload()'>Demo sıfırla</button>`}
draw();
</script></body></html>
