<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ÇeşmeAşk</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial;background:#eaf8ff;color:#082f49}#map{height:100vh}.top{position:fixed;top:10px;left:10px;right:10px;z-index:900;background:#fffffff2;border-radius:18px;padding:10px;box-shadow:0 10px 30px #07598522}.panel{display:none;position:fixed;z-index:950;left:10px;right:10px;top:88px;bottom:72px;background:#fffffff8;border-radius:22px;padding:15px;overflow:auto;box-shadow:0 16px 38px #07598525}.panel.on{display:block}.tabs{position:fixed;left:8px;right:8px;bottom:8px;z-index:1000;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:white;border-radius:20px;padding:7px}.tab{border:0;border-radius:15px;padding:12px 4px;background:#eff6ff;color:#075985;font-weight:900}.tab.on{background:#0ea5e9;color:white}.btn{width:100%;border:0;border-radius:14px;padding:12px;margin-top:8px;background:#0ea5e9;color:white;font-weight:950}.light{background:#eff6ff;color:#075985}.card{background:#f8fafc;border:1px solid #dbeafe;border-radius:16px;padding:12px;margin:9px 0}.ok{background:#dcfce7;color:#166534;border-radius:14px;padding:10px}.warn{background:#fff7ed;color:#9a3412;border-radius:14px;padding:10px}.bad{background:#fee2e2;color:#991b1b;border-radius:14px;padding:10px}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:13px;padding:11px;margin:6px 0 10px;font:inherit}.pin{position:relative}.pinb{background:white;border:2px solid #0ea5e9;border-radius:14px;padding:5px 8px;box-shadow:0 8px 22px #07598555;text-align:center}.cnt{position:absolute;right:-9px;top:-9px;background:#ef4444;color:white;border-radius:99px;min-width:22px;height:22px;font-size:12px;font-weight:950;text-align:center}.hero{background:linear-gradient(135deg,#0284c7,#38bdf8 45%,#fb923c);color:white;border-radius:24px;padding:14px;margin:10px 0}.pill{display:inline-block;background:#ffffff33;border-radius:999px;padding:6px 9px;margin:4px 4px 0 0}.avatar{width:82px;height:82px;border-radius:24px;background:white;object-fit:cover;display:grid;place-items:center;font-size:34px;color:#075985}</style></head><body><div class="top"><b>💙 ÇeşmeAşk</b><br><small>Profilini oluştur, mekânda görün, detaydan kişileri gör.</small></div><div id="map"></div><section id="venue" class="panel"><h2 id="venueTitle">Mekân</h2><div id="venueInfo" class="warn">Haritadan mekân seç.</div><button class="btn" onclick="checkInSelected()">📍 Buradayım</button><button class="btn light" onclick="loadPeople()">Detay gör / yenile</button><div id="peopleList"></div></section><section id="profile" class="panel"><h2>👤 Profil</h2><div id="profileView"></div><div id="profileEdit" class="card"><b>Profil bilgileri</b><input id="loginUser" placeholder="Kullanıcı adı / kod"><input id="profName" placeholder="Adın"><select id="profGender"><option value="">Erkek / Kadın seç</option><option>Erkek</option><option>Kadın</option></select><input id="profAge" type="number" placeholder="Yaş"><textarea id="profBio" rows="3" placeholder="Kısa bio"></textarea><input id="profInterests" placeholder="İlgi alanları"><button class="btn" onclick="saveProfile()">Profili kaydet</button><div id="profileSaved"></div></div></section><section id="help" class="panel"><h2>Nasıl çalışır?</h2><div class="card">1. Profilini kaydet.<br>2. Haritada mekân seç.<br>3. Buradayım’a bas.<br>4. Detay gör ile oradaki kişileri gör.</div></section><nav class="tabs"><button id="bmap" class="tab on" onclick="show('map')">🗺️ Harita</button><button id="bprof" class="tab" onclick="show('profile')">👤 Profil</button><button id="bhelp" class="tab" onclick="show('help')">ℹ️ Yardım</button></nav><script>var API='https://bztigwfnenwosulhxrxo.supabase.co/rest/v1/';var KEY='sb_publishable_P76ca2ta_N7PWpA_Wm6lTw__DEzK19l';var map,venues=[],selected=null;function E(id){return document.getElementById(id)}function val(id){return (E(id).value||'').trim()}function esc(s){return String(s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}async function api(path,params,opt){var u=new URL(API+path);Object.keys(params||{}).forEach(function(k){u.searchParams.set(k,params[k])});var r=await fetch(u,{method:(opt&&opt.method)||'GET',headers:{apikey:KEY,'Content-Type':'application/json'},body:opt&&opt.body?JSON.stringify(opt.body):undefined});var t=await r.text();var d=t?JSON.parse(t):null;if(!r.ok)throw Error((d&&d.message)||t||r.statusText);return d}function getProfile(){try{return JSON.parse(localStorage.ca_profile||'{}')}catch(e){return {}}}function setProfile(p){localStorage.ca_profile=JSON.stringify(p)}function dev(){var p=getProfile();if(p.user)return p.user;var d=localStorage.ca_device;if(!d){d='dev_'+Math.random().toString(36).slice(2)+'_'+Date.now();localStorage.ca_device=d}return d}function show(id){document.querySelectorAll('.panel').forEach(function(x){x.classList.remove('on')});document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')});if(id==='map'){bmap.classList.add('on');if(map)map.invalidateSize();loadVenues();return}E(id).classList.add('on');({profile:bprof,help:bhelp,venue:bmap}[id]||bmap).classList.add('on');if(id==='profile')renderProfile(false)}function renderProfile(edit){var p=getProfile();if(!p.name||edit){profileEdit.style.display='block';profileView.innerHTML=p.name?'<div class="ok">Düzenleme modu</div>':'<div class="warn">Önce profilini doldur.</div>';loginUser.value=p.user||'';profName.value=p.name||'';profGender.value=p.gender||'';profAge.value=p.age||'';profBio.value=p.bio||'';profInterests.value=p.interests||'';return}profileEdit.style.display='none';profileView.innerHTML='<div class="hero"><div class="avatar">👤</div><h2>'+esc(p.name)+'</h2><p><b>'+esc(p.gender||'?')+'</b> · '+esc(p.age||'?')+' yaş</p><p>'+esc(p.bio||'Bio yok')+'</p><span class="pill">'+esc(p.interests||'')+'</span></div><button class="btn light" onclick="editProfile()">Profili düzenle</button>'}function editProfile(){renderProfile(true)}window.editProfile=editProfile;function saveProfile(){var user=val('loginUser').toLowerCase().replace(/[^a-z0-9_]/g,'');if(!user)user=dev();var p={user:user,name:val('profName'),gender:val('profGender'),age:val('profAge'),bio:val('profBio'),interests:val('profInterests')};if(!p.name){profileSaved.className='bad';profileSaved.innerHTML='Ad boş olamaz.';return}if(!p.gender){profileSaved.className='bad';profileSaved.innerHTML='Erkek/Kadın seç.';return}setProfile(p);localStorage.ca_device=user;profileSaved.className='ok';profileSaved.innerHTML='Profil kaydedildi ✅';renderProfile(false);syncProfile().catch(function(e){profileSaved.className='bad';profileSaved.innerHTML='DB kaydı olmadı: '+esc(e.message)})}window.saveProfile=saveProfile;async function syncProfile(){var p=getProfile();if(!p.name||!p.gender)throw Error('Profil eksik');return api('rpc/upsert_device_profile_v4',{}, {method:'POST',body:{p_device_id:dev(),p_display_name:p.name,p_age:parseInt(p.age||0)||null,p_height_cm:null,p_weight_kg:null,p_gender:p.gender,p_bio:p.bio||'',p_interests:p.interests||'',p_instagram:'',p_photo_url:''}})}async function ensureProfile(){var p=getProfile();if(!p.name||!p.gender){show('profile');alert('Önce ad + Erkek/Kadın seçip profili kaydet.');throw Error('Profil eksik')}await syncProfile()}function pinIcon(v){return L.divIcon({className:'pin',html:'<div class="pinb">'+(v.emoji||'📍')+'<br><small>'+esc(v.name)+'</small></div><div class="cnt">'+Number(v.live_count||0)+'</div>',iconSize:[80,58],iconAnchor:[40,58],popupAnchor:[0,-58]})}async function loadVenues(){try{venues=await api('rpc/venues_with_counts',{}, {method:'POST'});if(!map){map=L.map('map').setView([38.302,26.34],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map)}map.eachLayer(function(l){if(l instanceof L.Marker)map.removeLayer(l)});venues.forEach(function(v){if(!v.lat||!v.lng)return;L.marker([v.lat,v.lng],{icon:pinIcon(v)}).addTo(map).bindPopup('<b>'+esc(v.emoji||'📍')+' '+esc(v.name)+'</b><br>'+Number(v.live_count||0)+' kişi burada<br><button onclick="selectVenue(\''+v.id+'\')">Detay gör</button><button onclick="quickCheckIn(\''+v.id+'\')">Buradayım</button>')})}catch(e){alert('Mekânlar yüklenmedi: '+e.message)}}function selectVenue(id){selected=venues.find(function(v){return v.id===id});venueTitle.textContent=(selected.emoji||'📍')+' '+selected.name;venueInfo.className='ok';venueInfo.innerHTML='<b>'+Number(selected.live_count||0)+' kişi burada.</b>';peopleList.innerHTML='';show('venue');loadPeople()}window.selectVenue=selectVenue;async function quickCheckIn(id){selected=venues.find(function(v){return v.id===id});await checkInSelected()}window.quickCheckIn=quickCheckIn;async function checkInSelected(){if(!selected){alert('Önce mekân seç.');return}try{await ensureProfile();await api('rpc/device_checkin',{}, {method:'POST',body:{p_device_id:dev(),p_venue_id:selected.id}});var p=getProfile();venueInfo.className='ok';venueInfo.innerHTML='Eklendin ✅ <b>'+esc(p.name)+'</b> · '+esc(p.gender);await loadVenues();await loadPeople()}catch(e){if(e.message!=='Profil eksik')alert('Buradayım olmadı: '+e.message)}}window.checkInSelected=checkInSelected;async function loadPeople(){if(!selected)return;peopleList.innerHTML='<div class="warn">Kişiler yükleniyor...</div>';try{var rows=await api('rpc/people_at_venue_v4',{}, {method:'POST',body:{p_venue_id:selected.id}});if(!rows.length){peopleList.innerHTML='<div class="warn">Şu an bu mekânda görünen kimse yok.</div>';return}window.peopleRows=rows;peopleList.innerHTML=rows.map(function(p,i){var me=p.device_id===dev()?' <b>(sen)</b>':'';return '<div class="card"><b>'+esc(p.display_name)+me+'</b><br><small>'+esc(p.gender||'?')+' · '+esc(p.age||'?')+' yaş</small><p>'+esc(p.bio||'Bio yok')+'</p><button class="btn light" onclick="openPerson('+i+')">Profili gör</button></div>'}).join('')}catch(e){peopleList.innerHTML='<div class="bad">Detay yüklenmedi: '+esc(e.message)+'</div>'}}window.loadPeople=loadPeople;function openPerson(i){var p=window.peopleRows[i];peopleList.innerHTML='<div class="hero"><div class="avatar">👤</div><h2>'+esc(p.display_name)+'</h2><p>'+esc(p.gender||'?')+' · '+esc(p.age||'?')+' yaş</p><p>'+esc(p.bio||'Bio yok')+'</p><span class="pill">'+esc(p.interests||'')+'</span></div><button class="btn light" onclick="loadPeople()">Geri dön</button>'}window.openPerson=openPerson;loadVenues();</script></body></html>
