<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ÇeşmeAşk</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial;background:linear-gradient(135deg,#e0f2fe,#fff7ed);color:#082f49}.wrap{max-width:560px;margin:0 auto;padding:14px 14px 88px}.top{position:sticky;top:0;background:#fffffff2;border-radius:0 0 24px 24px;padding:14px;box-shadow:0 12px 30px #07598522}h1{margin:0}.muted{color:#64748b;font-weight:750}.card{background:white;border:1px solid #dbeafe;border-radius:22px;padding:14px;margin:10px 0;box-shadow:0 10px 26px #07598512}.panel{display:none}.panel.on{display:block}.dock{position:fixed;left:50%;bottom:10px;transform:translateX(-50%);width:min(560px,calc(100% - 18px));display:grid;grid-template-columns:repeat(4,1fr);gap:7px;background:#082f49ee;border-radius:27px;padding:8px}.tab{border:0;border-radius:20px;background:transparent;color:#bae6fd;font-weight:950;padding:10px 3px}.tab.on{background:linear-gradient(135deg,#0ea5e9,#fb923c);color:white}.btn{border:0;border-radius:16px;padding:12px 14px;background:#0ea5e9;color:white;font-weight:950}.light{background:#e0f2fe;color:#075985}.warm{background:#fb923c}.row{display:flex;gap:8px;flex-wrap:wrap}.venue,.person{display:flex;gap:12px;align-items:center}.ava{width:64px;height:64px;border-radius:50%;background:#dbeafe;display:grid;place-items:center;font-size:26px;font-weight:950;flex:0 0 auto}.grow{flex:1}.ok{background:#dcfce7;color:#166534;border-radius:16px;padding:10px;margin:8px 0}.warn{background:#fff7ed;color:#9a3412;border-radius:16px;padding:10px;margin:8px 0}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:16px;padding:12px;margin:7px 0 12px;font:inherit}.name{font-size:28px;font-weight:1000}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}.cell{aspect-ratio:1;background:#e2e8f0;display:grid;place-items:center;border-radius:6px}.cell img{width:100%;height:100%;object-fit:cover;border-radius:6px}</style></head><body><div class="wrap"><div class="top"><h1>ÇeşmeAşk</h1><div class="muted">Stabil sürüm · üyelik/ödeme yok</div></div><section id="map" class="panel on"><h2>Harita</h2><div class="warn">Harita kayma hatası yüzünden sade moda alındı. Detay tuşları artık sayfa içinde açılıyor.</div><div id="venues"></div></section><section id="detail" class="panel"><h2 id="dtitle">Detay</h2><div id="dinfo" class="ok"></div><div class="row"><button class="btn warm" onclick="checkin()">Buradayım</button><button class="btn light" onclick="show('map')">Geri</button></div><div id="people"></div></section><section id="msg" class="panel"><h2>Mesajlar</h2><div class="card muted">Mesaj kısmını bozmadım; şu an ödeme/üyelik ekranı yok.</div></section><section id="profile" class="panel"><div id="prof"></div></section></div><nav class="dock"><button id="tmap" class="tab on" onclick="show('map')">Harita</button><button id="tdetail" class="tab" onclick="show('detail')">Detay</button><button id="tmsg" class="tab" onclick="show('msg')">Mesaj</button><button id="tprofile" class="tab" onclick="show('profile')">Profil</button></nav><input id="photo" type="file" accept="image/*" style="display:none"><script>const V=[['☕','starbucks','Starbucks Ilıca','Ilıca','2 kişi'],['🧿','alacati','Alaçatı Çarşı','Alaçatı','1 kişi'],['⛵','marina','Çeşme Marina','Merkez','0 kişi'],['🌅','before','Before Sunset','Ovacık','1 kişi']];let selected=V[0];function $(x){return document.getElementById(x)}function get(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch(e){return d}}function set(k,v){localStorage.setItem(k,JSON.stringify(v))}function show(id){['map','detail','msg','profile'].forEach(x=>{$(x).classList.toggle('on',x===id);$('t'+x).classList.toggle('on',x===id)});if(id==='profile')renderProfile()}function renderVenues(){$('venues').innerHTML=V.map((v,i)=>'<div class="card venue"><div class="ava">'+v[0]+'</div><div class="grow"><b>'+v[2]+'</b><div class="muted">'+v[3]+' · '+v[4]+'</div><div class="row"><button class="btn light" onclick="detail('+i+')">Detaylar</button><button class="btn warm" onclick="detail('+i+');checkin()">Buradayım</button></div></div></div>').join('')}function detail(i){selected=V[i];$('dtitle').textContent=selected[2];$('dinfo').textContent=selected[4]+' burada görünüyor.';$('people').innerHTML='<div class="card person"><div class="ava">O</div><div class="grow"><b>onur</b><div class="muted">Erkek · 20 yaş</div><p>deneme</p></div></div>';show('detail')}function checkin(){$('dinfo').textContent='Check-in oldu: '+selected[2]}function renderProfile(){let p=get('ca_profile2',{}),ph=get('ca_photos2',[]);if(!p.name){$('prof').innerHTML='<h2>Profil düzenle</h2><div class="card"><input id="n" placeholder="Ad"><select id="g"><option>Erkek</option><option>Kadın</option></select><input id="a" type="number" placeholder="Yaş"><textarea id="b" placeholder="Bio"></textarea><button class="btn" onclick="saveP()">Kaydet</button></div>';return}$('prof').innerHTML='<div class="card person"><div class="ava">'+(ph[0]?'<img src="'+ph[0]+'" style="width:100%;height:100%;border-radius:50%;object-fit:cover">':p.name[0])+'</div><div class="grow"><div class="name">'+p.name+'</div><div class="muted">'+p.gender+' · '+p.age+' yaş</div></div></div><div class="card"><p>'+p.bio+'</p><button class="btn light" onclick="editP()">Profili düzenle</button> <button class="btn warm" onclick="photo.click()">Fotoğraf ekle</button></div><div class="grid">'+[0,1,2,3,4,5].map(i=>ph[i]?'<div class="cell"><img src="'+ph[i]+'"></div>':'<div class="cell">+</div>').join('')+'</div>'}function editP(){let p=get('ca_profile2',{});$('prof').innerHTML='<h2>Profil düzenle</h2><div class="card"><input id="n" value="'+(p.name||'')+'" placeholder="Ad"><select id="g"><option '+(p.gender==='Erkek'?'selected':'')+'>Erkek</option><option '+(p.gender==='Kadın'?'selected':'')+'>Kadın</option></select><input id="a" type="number" value="'+(p.age||'')+'" placeholder="Yaş"><textarea id="b" placeholder="Bio">'+(p.bio||'')+'</textarea><button class="btn" onclick="saveP()">Kaydet</button></div>'}function saveP(){set('ca_profile2',{name:n.value||'onur',gender:g.value,age:a.value||20,bio:b.value||''});renderProfile()}photo.onchange=function(){let f=this.files[0];if(!f)return;let r=new FileReader();r.onload=function(){let ph=get('ca_photos2',[]);ph.unshift(r.result);set('ca_photos2',ph.slice(0,6));renderProfile()};r.readAsDataURL(f)}renderVenues();renderProfile();</script></body></html>
