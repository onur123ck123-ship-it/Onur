<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>ÇeşmeAşk</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;color:#082f49;background:#eaf8ff}button{font:inherit;cursor:pointer}#map{position:fixed;inset:0;z-index:1;background:#cfefff}.top{position:fixed;z-index:6;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;gap:10px;pointer-events:none}.brand,.game{pointer-events:auto;background:#fffffff2;border:1px solid #fff;border-radius:24px;box-shadow:0 14px 36px #07598524;backdrop-filter:blur(12px)}.brand{padding:12px 15px}.brand b{font-size:23px}.brand small{display:block;color:#64748b;font-weight:800}.game{border:0;padding:12px 15px;color:#075985;font-weight:950}.panel{display:none;position:fixed;z-index:4;top:78px;bottom:78px;left:10px;right:10px;background:#f8fafcf4;border:1px solid #dbeafe;border-radius:28px;padding:14px;overflow:auto;-webkit-overflow-scrolling:touch;backdrop-filter:blur(12px);box-shadow:0 18px 45px #07598522}.panel.on{display:block}.panel.map-panel{top:auto;max-height:44vh}.dock{position:fixed;z-index:7;left:50%;bottom:10px;transform:translateX(-50%);width:min(620px,calc(100% - 18px));display:grid;grid-template-columns:repeat(4,1fr);gap:7px;background:#082f49ee;border-radius:27px;padding:8px;box-shadow:0 18px 48px #082f4980}.tab{border:0;border-radius:20px;background:transparent;color:#bae6fd;font-weight:950;font-size:12px;padding:10px 3px}.tab.on{background:linear-gradient(135deg,#0ea5e9,#fb923c);color:white}.card{background:white;border:1px solid #dbeafe;border-radius:22px;padding:14px;margin:10px 0;box-shadow:0 10px 26px #07598512}.btn{border:0;border-radius:16px;padding:12px 14px;background:#0ea5e9;color:white;font-weight:950}.light{background:#e0f2fe;color:#075985}.warm{background:#fb923c}.row{display:flex;gap:8px;flex-wrap:wrap}.ok{background:#dcfce7;color:#166534;border-radius:16px;padding:10px;margin:8px 0}.warn{background:#fff7ed;color:#9a3412;border-radius:16px;padding:10px;margin:8px 0}input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:16px;padding:12px;margin:7px 0 12px;font:inherit}.ava{width:66px;height:66px;border-radius:50%;background:#dbeafe;display:grid;place-items:center;font-size:26px;font-weight:950;flex:0 0 auto;overflow:hidden}.ava img{width:100%;height:100%;object-fit:cover}.venue,.person{display:flex;gap:12px;align-items:center}.grow{flex:1}.muted{color:#64748b;font-weight:750}.name{font-size:28px;font-weight:1000}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;text-align:center;padding:9px 4px}.stat b{display:block;font-size:19px}.pill{display:inline-block;background:#e0f2fe;color:#075985;border-radius:999px;padding:7px 10px;margin:5px 4px 0 0;font-size:12px;font-weight:900}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:12px}.cell{aspect-ratio:1;background:#e2e8f0;display:grid;place-items:center;border-radius:8px;overflow:hidden}.cell img{width:100%;height:100%;object-fit:cover}.pop{border:0;border-radius:999px;background:#0ea5e9;color:white;font-weight:900;padding:8px 10px;margin-top:7px}.maphint{position:fixed;z-index:3;left:12px;right:12px;top:84px;margin:0 auto;width:min(620px,calc(100% - 24px));background:#ffffffe8;border:1px solid #dbeafe;border-radius:18px;padding:9px 12px;color:#075985;font-size:13px;font-weight:900;box-shadow:0 10px 28px #0759851f}@media(min-width:740px){.panel{left:50%;right:auto;width:620px;transform:translateX(-50%);top:88px;bottom:88px}.panel.map-panel{top:auto;max-height:42vh}.maphint{top:90px}}
  </style>
</head>
<body>
  <div id="map" aria-label="Çeşme mekan haritası"></div>
  <div class="maphint">Harita açık: sürükle, yakınlaştır, mekân pinlerine bas.</div>
  <div class="top"><div class="brand"><b>ÇeşmeAşk</b><small>Mekânı seç · görün · tanış</small></div><button class="game" onclick="location.href='/game.html'">Oyun</button></div>
  <section id="home" class="panel map-panel on"><h2>Harita</h2><div class="ok">Harita ve sekmeler sağlam moda alındı. Mekân seçince detaya geçer.</div><div id="mapStatus"></div><div id="venues"></div></section>
  <section id="detail" class="panel"><h2 id="dtitle">Detay</h2><div id="dinfo" class="ok"></div><div class="row"><button class="btn warm" onclick="checkin()">Buradayım</button><button class="btn light" onclick="show('home')">Haritaya dön</button></div><div id="people"></div></section>
  <section id="msg" class="panel"><h2>Mesajlar</h2><div class="card muted">Mesaj ekranı burada duruyor. Harita ve sekme geçişi önce sağlamlaştırıldı.</div></section>
  <section id="profile" class="panel"><div id="prof"></div></section>
  <nav class="dock"><button id="thome" class="tab on" onclick="show('home')">Harita</button><button id="tdetail" class="tab" onclick="show('detail')">Detay</button><button id="tmsg" class="tab" onclick="show('msg')">Mesaj</button><button id="tprofile" class="tab" onclick="show('profile')">Profil</button></nav>
  <input id="photo" type="file" accept="image/*" style="display:none">
  <script>
    var V=[['☕','starbucks','Starbucks Ilıca','Ilıca','2 kişi',38.3115,26.3632],['🧿','alacati','Alaçatı Çarşı','Alaçatı','1 kişi',38.2828,26.3742],['⛵','marina','Çeşme Marina','Merkez','0 kişi',38.3260,26.3059],['🌅','before','Before Sunset','Ovacık','1 kişi',38.2845,26.2478],['🌙','ayayorgi','Aya Yorgi Koyu','Ayayorgi','0 kişi',38.3312,26.3357]];
    var selected=V[0],map=null,markers=[];
    var panels=['home','detail','msg','profile'];
    function $(id){return document.getElementById(id)}
    function esc(x){return String(x||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
    function get(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch(e){return d}}
    function set(k,v){localStorage.setItem(k,JSON.stringify(v))}
    function invalidateMap(){if(map&&map.invalidateSize)setTimeout(function(){map.invalidateSize()},120)}
    function show(id){if(panels.indexOf(id)<0)id='home';panels.forEach(function(x){var p=$(x),t=$('t'+x);if(p)p.classList.toggle('on',x===id);if(t)t.classList.toggle('on',x===id)});if(id==='profile')renderProfile();if(id==='home')invalidateMap()}
    function setMapStatus(text,kind){var box=$('mapStatus');if(!box)return;box.innerHTML=text?'<div class="'+(kind||'warn')+'">'+esc(text)+'</div>':''}
    function initMap(){
      if(!window.L){setMapStatus('Harita kütüphanesi yüklenemedi. İnternet/CDN engellenirse yine listeden mekân seçebilirsin.','warn');return}
      try{
        map=L.map('map',{zoomControl:true}).setView([38.302,26.34],12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);
        V.forEach(function(v,i){
          var popup='<b>'+esc(v[2])+'</b><br>'+esc(v[4])+' burada<br><button class="pop" onclick="detail('+i+')">Detaylar</button>';
          markers[i]=L.marker([v[5],v[6]]).addTo(map).bindPopup(popup);
        });
        window.addEventListener('resize',invalidateMap);
        setTimeout(invalidateMap,250);
        setMapStatus('', 'ok');
      }catch(e){setMapStatus('Harita açılırken hata verdi: '+e.message,'warn')}
    }
    function renderVenues(){var box=$('venues');if(!box)return;box.innerHTML=V.map(function(v,i){return '<div class="card venue"><div class="ava">'+v[0]+'</div><div class="grow"><b>'+esc(v[2])+'</b><div class="muted">'+esc(v[3])+' · '+esc(v[4])+'</div><div class="row"><button class="btn light" onclick="focusVenue('+i+')">Haritada göster</button><button class="btn warm" onclick="detail('+i+')">Detaylar</button></div></div></div>'}).join('')}
    function focusVenue(i){selected=V[i]||V[0];show('home');if(map){map.flyTo([selected[5],selected[6]],15,{duration:.7});if(markers[i])setTimeout(function(){markers[i].openPopup()},350)}else{detail(i)}}
    function detail(i){selected=V[i]||selected||V[0];$('dtitle').textContent=selected[2];$('dinfo').textContent=selected[4]+' burada görünüyor.';$('people').innerHTML='<div class="card person"><div class="ava">O</div><div class="grow"><b>onur</b><div class="muted">Erkek · 20 yaş</div><p>deneme</p></div></div>';show('detail')}
    function checkin(){if(!$('dinfo'))return;$('dinfo').textContent='Check-in oldu: '+selected[2]}
    function openPhotoPicker(){var input=$('photo');if(input)input.click()}
    function renderProfile(){var p=get('ca_profile2',{}),ph=get('ca_photos2',[]);if(!p.name){editP();return}$('prof').innerHTML='<div class="card person"><div class="ava">'+(ph[0]?'<img src="'+esc(ph[0])+'">':esc(p.name[0]||'O'))+'</div><div class="grow"><div class="name">'+esc(p.name)+'</div><div class="muted">'+esc(p.gender)+' · '+esc(p.age)+' yaş</div><div class="stats"><div class="stat"><b>'+ph.length+'</b>Foto</div><div class="stat"><b>0</b>Eşleşme</div><div class="stat"><b>0</b>Mekân</div></div></div></div><div class="card"><p>'+esc(p.bio)+'</p><button class="btn light" onclick="editP()">Profili düzenle</button> <button class="btn warm" onclick="openPhotoPicker()">Fotoğraf ekle</button></div><div class="grid">'+[0,1,2,3,4,5].map(function(i){return ph[i]?'<div class="cell"><img src="'+esc(ph[i])+'"></div>':'<div class="cell">+</div>'}).join('')+'</div>'}
    function editP(){var p=get('ca_profile2',{});$('prof').innerHTML='<h2>Profil düzenle</h2><div class="card"><input id="n" value="'+esc(p.name||'')+'" placeholder="Ad"><select id="g"><option '+(p.gender==='Erkek'?'selected':'')+'>Erkek</option><option '+(p.gender==='Kadın'?'selected':'')+'>Kadın</option></select><input id="a" type="number" value="'+esc(p.age||'')+'" placeholder="Yaş"><textarea id="b" placeholder="Bio">'+esc(p.bio||'')+'</textarea><button class="btn" onclick="saveP()">Kaydet</button></div>'}
    function saveP(){var n=$('n'),g=$('g'),a=$('a'),b=$('b');set('ca_profile2',{name:(n&&n.value)||'onur',gender:(g&&g.value)||'Erkek',age:(a&&a.value)||20,bio:(b&&b.value)||''});renderProfile()}
    function bindPhoto(){var input=$('photo');if(!input)return;input.addEventListener('change',function(){var f=this.files&&this.files[0];if(!f)return;var r=new FileReader();r.onload=function(){var ph=get('ca_photos2',[]);ph.unshift(r.result);set('ca_photos2',ph.slice(0,6));renderProfile()};r.readAsDataURL(f)})}
    function boot(){bindPhoto();renderVenues();initMap();renderProfile();show('home')}
    if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
  </script>
</body>
</html>
