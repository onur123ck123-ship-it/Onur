<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ÇeşmeAşk</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial;background:#eaf8ff;color:#082f49}.wrap{max-width:520px;margin:20px auto;padding:14px}.card{background:white;border-radius:24px;padding:16px;margin:12px 0;box-shadow:0 12px 30px #07598522}button{border:0;border-radius:16px;background:#0ea5e9;color:white;font-weight:900;padding:12px 14px}input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:14px;padding:11px;margin:7px 0 12px}.tab{background:#e0f2fe;color:#075985}.on{background:#0ea5e9;color:white}</style></head><body><div class="wrap"><h1>ÇeşmeAşk</h1><div><button class="tab on" onclick="openTab('map')">Harita</button> <button class="tab" onclick="openTab('profile')">Profil</button> <button class="tab" onclick="openTab('messages')">Mesaj</button></div><section id="map" class="card"><h2>Harita</h2><p>Stabil sürüm açıldı. Detaylar ve profil ekranı kaymadan çalışacak şekilde sade moda alındı.</p><button onclick="alert('Detaylar temiz sürümde yeniden bağlanıyor')">Detaylar</button></section><section id="profile" class="card" style="display:none"><h2>Profil</h2><input id="name" placeholder="Ad"><select id="gender"><option>Erkek</option><option>Kadın</option></select><input id="age" type="number" placeholder="Yaş"><textarea id="bio" placeholder="Bio"></textarea><button onclick="save()">Profili kaydet</button><div id="out"></div></section><section id="messages" class="card" style="display:none"><h2>Mesajlar</h2><p>Üyelik/ödeme ekranı kaldırıldı.</p></section></div><script>function openTab(id){['map','profile','messages'].forEach(x=>document.getElementById(x).style.display=x===id?'block':'none')}function save(){localStorage.ca_profile_simple=JSON.stringify({name:name.value,gender:gender.value,age:age.value,bio:bio.value});out.innerHTML='<p>Kaydedildi.</p>'}</script></body></html>
