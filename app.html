<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>ÇeşmeAşk</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial;color:#082f49;background:#eaf8ff}#map{position:fixed;inset:0;z-index:1}.top{position:fixed;z-index:5;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none}.brand,.game{pointer-events:auto;background:#fffffff2;border:1px solid #fff;border-radius:24px;box-shadow:0 14px 36px #07598524;backdrop-filter:blur(12px)}.brand{padding:12px 15px}.brand b{font-size:23px}.brand small{display:block;color:#64748b;font-weight:800}.game{border:0;padding:12px 15px;color:#075985;font-weight:950}.panel{display:none;position:fixed;z-index:4;top:78px;bottom:78px;left:10px;right:10px;background:#f8fafcf4;border:1px solid #dbeafe;border-radius:28px;padding:14px;overflow:auto;-webkit-overflow-scrolling:touch;backdrop-filter:blur(12px);box-shadow:0 18px 45px #07598522}.panel.on{display:block}.dock{position:fixed;z-index:6;left:50%;bottom:10px;transform:translateX(-50%);width:min(620px,calc(100% - 18px));display:grid;grid-template-columns:repeat(4,1fr);gap:7px;background:#082f49ee;border-radius:27px;padding:8px;box-shadow:0 18px 48px #082f4980}.tab{border:0;border-radius:20px;background:transparent;color:#bae6fd;font-weight:950;font-size:12px;padding:10px 3px}.tab.on{background:linear-gradient(135deg,#0ea5e9,#fb923c);color:white}.card{background:white;border:1px solid #dbeafe;border-radius:22px;padding:14px;margin:10px 0;box-shadow:0 10px 26px #07598512}.btn{border:0;border-radius:16px;padding:12px 14px;background:#0ea5e9;color:white;font-weight:950}.light{background:#e0f2fe;color:#075985}.warm{background:#fb923c}.row{display:flex;gap:8px;flex-wrap:wrap}.ok{background:#dcfce7;color:#166534;border-radius:16px;padding:10px;margin:8px 0}.warn{background:#fff7ed;color:#9a3412;border-radius:16px;padding:10px;margin:8px 0}input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:16px;padding:12px;margin:7px 0 12px;font:inherit}.ava{width:66px;height:66px;border-radius:50%;background:#dbeafe;display:grid;place-items:center;font-size:26px;font-weight:950;flex:0 0 auto;overflow:hidden}.ava img{width:100%;height:100%;object-fit:cover}.venue,.person{display:flex;gap:12px;align-items:center}.grow{flex:1}.muted{color:#64748b;font-weight:750}.name{font-size:28px;font-weight:1000}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;text-align:center;padding:9px 4px}.stat b{display:block;font-size:19px}.pill{display:inline-block;background:#e0f2fe;color:#075985;border-radius:999px;padding:7px 10px;margin:5px 4px 0 0;font-size:12px;font-weight:900}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:12px}.cell{aspect-ratio:1;background:#e2e8f0;display:grid;place-items:center;border-radius:8px;overflow:hidden}.cell img{width:100%;height:100%;object-fit:cover}.pop{border:0;border-radius:999px;background:#0ea5e9;color:white;font-weight:900;padding:8px 10px;margin-top:7px}@media(min-width:740px){.panel{left:50%;right:auto;width:620px;transform:translateX(-50%);top:88px;bottom:88px}}</style></head><body><div id="map"></div><div class="top"><div class="brand"><b>ÇeşmeAşk</b><small>Mekânı seç · görün · tanış</small></div><button class="game" onclick="location.href='/game.html'">Oyun</button></div><section id="home" class="panel on"><h2>Harita</h2><div class="ok">Harita geri getirildi. Üyelik/ödeme yok.</div><div id="venues"></div></section><section id="detail" class="panel"><h2 id="dtitle">Detay</h2><div id="dinfo" class="ok"></div><div class="row"><button class="btn warm" onclick="checkin()">Buradayım</button><button class="btn light" onclick="show('home')">Geri</button></div><div id="people"></div></section><section id="msg" class="panel"><h2>Mesajlar</h2><div class="card muted">Mesaj ekranı duruyor. Önce harita ve profil geri alındı.</div></section><section id="profile" class="panel"><div id="prof"></div></section><nav class="dock"><button id="thome" class="tab on" onclick="show('home')">Harita</button><button id="tdetail" class="tab" onclick="show('detail')">Detay</button><button id="tmsg" class="tab" onclick="show('msg')">Mesaj</button><button id="tprofile" class="tab" onclick="show('profile')">Profil</button></nav><input id="photo" type="file" accept="image/*" style="display:none"><script>const V=[['☕','starbucks','Starbucks Ilıca','Ilıca','2 kişi',38.3115,26.3632],['🧿','alacati','Alaçatı Çarşı','Alaçatı','1 kişi',38.2828,26.3742],['⛵','marina','Çeşme Marina','Merkez','0 kişi',38.3260,26.3059],['🌅','before','Before Sunset','Ovacık','1 kişi',38.2845,26.2478],['🌙','ayayorgi','Aya Yorgi Koyu','Ayayorgi','0 kişi',38.3312,26.3357]];let selected=V[0],map;function $(x){return document.getElementById(x)}function get(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch(e){return d}}function set(k,v){localStorage.setItem(k,JSON.stringify(v))}function show(id){['home','detail','msg','profile'].forEach(x=>{$(x).classList.toggle('on',x===id);$('t'+x).classList.toggle('on',x===id)});if(id==='profile')renderProfile();if(id==='home'&&map)setTimeout(()=>map.invalidateSize(),80)}function initMap(){map=L.map('map').setView([38.302,26.34],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);V.forEach((v,i)=>{L.marker([v[5],v[6]]).addTo(map).bindPopup('<b>'+v[2]+'</b><br>'+v[4]+' burada<br><button class="pop" onclick="detail('+i+')">Detaylar</button>')});setTimeout(()=>map.invalidateSize(),150)}function renderVenues(){$('venues').innerHTML=V.map((v,i)=>'<div class="card venue"><div class="ava">'+v[0]+'</div><div class="grow"><b>'+v[2]+'</b><div class="muted">'+v[3]+' · '+v[4]+'</div><div class="row"><button class="btn light" onclick="detail('+i+')">Detaylar</button><button class="btn warm" onclick="detail('+i+');checkin()">Buradayım</button></div></div></div>').join('')}function detail(i){selected=V[i];$('dtitle').textContent=selected[2];$('dinfo').textContent=selected[4]+' burada görünüyor.';$('people').innerHTML='<div class="card person"><div class="ava">O</div><div class="grow"><b>onur</b><div class="muted">Erkek · 20 yaş</div><p>deneme</p></div></div>';show('detail')}function checkin(){$('dinfo').textContent='Check-in oldu: '+selected[2]}function renderProfile(){let p=get('ca_profile2',{}),ph=get('ca_photos2',[]);if(!p.name){editP();return}$('prof').innerHTML='<div class="card person"><div class="ava">'+(ph[0]?'<img src="'+ph[0]+'">':p.name[0])+'</div><div class="grow"><div class="name">'+p.name+'</div><div class="muted">'+p.gender+' · '+p.age+' yaş</div><div class="stats"><div class="stat"><b>'+ph.length+'</b>Foto</div><div class="stat"><b>0</b>Eşleşme</div><div class="stat"><b>0</b>Mekân</div></div></div></div><div class="card"><p>'+p.bio+'</p><button class="btn light" onclick="editP()">Profili düzenle</button> <button class="btn warm" onclick="photo.click()">Fotoğraf ekle</button></div><div class="grid">'+[0,1,2,3,4,5].map(i=>ph[i]?'<div class="cell"><img src="'+ph[i]+'"></div>':'<div class="cell">+</div>').join('')+'</div>'}function editP(){let p=get('ca_profile2',{});$('prof').innerHTML='<h2>Profil düzenle</h2><div class="card"><input id="n" value="'+(p.name||'')+'" placeholder="Ad"><select id="g"><option '+(p.gender==='Erkek'?'selected':'')+'>Erkek</option><option '+(p.gender==='Kadın'?'selected':'')+'>Kadın</option></select><input id="a" type="number" value="'+(p.age||'')+'" placeholder="Yaş"><textarea id="b" placeholder="Bio">'+(p.bio||'')+'</textarea><button class="btn" onclick="saveP()">Kaydet</button></div>'}function saveP(){set('ca_profile2',{name:n.value||'onur',gender:g.value,age:a.value||20,bio:b.value||''});renderProfile()}photo.onchange=function(){let f=this.files[0];if(!f)return;let r=new FileReader();r.onload=function(){let ph=get('ca_photos2',[]);ph.unshift(r.result);set('ca_photos2',ph.slice(0,6));renderProfile()};r.readAsDataURL(f)}renderVenues();initMap();renderProfile();</script></body></html>
