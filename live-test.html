<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ÇeşmeAşk Live Test</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#dff7ff,#fff7ed);color:#082f49}.wrap{max-width:560px;margin:auto;padding:24px 14px}.card{background:white;border-radius:26px;padding:18px;margin:12px 0;box-shadow:0 18px 46px #07598524}.ok{background:#dcfce7;color:#166534;border-radius:16px;padding:12px;font-weight:900}.bad{background:#fee2e2;color:#991b1b;border-radius:16px;padding:12px;font-weight:900}.warn{background:#fff7ed;color:#9a3412;border-radius:16px;padding:12px;font-weight:900}.btn{width:100%;border:0;border-radius:18px;padding:15px;margin-top:10px;background:#0ea5e9;color:white;font-weight:950;font-size:16px}pre{white-space:pre-wrap;background:#f8fafc;border-radius:16px;padding:12px;overflow:auto}</style></head><body><div class="wrap"><h1>ÇeşmeAşk Live DB Test</h1><div class="card"><p id="status" class="warn">Test başlıyor...</p><button class="btn" onclick="runTest()">Tekrar test et</button></div><div class="card"><h2>Sonuç</h2><pre id="out">Bekleniyor...</pre></div><div class="card"><a href="/">Ana uygulamaya dön</a></div></div><script>const URL='https://bztigwfnenwosulhxrxo.supabase.co/rest/v1/venues?select=id,name,area,category&limit=10';const KEY='sb_publishable_P76ca2ta_N7PWpA_Wm6lTw__DEzK19l';function set(cls,msg){status.className=cls;status.textContent=msg}async function runTest(){set('warn','Supabase deneniyor...');out.textContent='İstek gönderildi...';const c=new AbortController();const t=setTimeout(()=>c.abort(),6000);try{let r=await fetch(URL,{headers:{apikey:KEY,Authorization:'Bearer '+KEY},signal:c.signal});clearTimeout(t);let text=await r.text();if(!r.ok)throw new Error('HTTP '+r.status+' '+text);let data=JSON.parse(text);set('ok','Bağlantı başarılı ✅ '+data.length+' mekân geldi');out.textContent=JSON.stringify(data,null,2)}catch(e){clearTimeout(t);set('bad','Bağlantı başarısız ❌');out.textContent=e.message+'\n\nBu olursa ana app demo modda kalır, DB bağlantısını farklı yoldan çözeriz.'}}runTest()</script></body></html>
