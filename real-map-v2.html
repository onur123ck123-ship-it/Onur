<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>ÇeşmeAşk Real Map</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}#map{height:100vh}.top{position:fixed;top:10px;left:10px;right:10px;z-index:999;background:white;border-radius:18px;padding:10px 12px;box-shadow:0 8px 30px #0002}.top b{font-size:20px}.leaflet-popup-content button{border:0;border-radius:10px;padding:8px 10px;background:#0ea5e9;color:white;font-weight:900}</style></head><body><div class="top"><b>ÇeşmeAşk gerçek harita v2</b><br><small>Gerçek OpenStreetMap + Çeşme pinleri</small></div><div id="map"></div><script>var map=L.map('map').setView([38.302,26.34],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);var places=[['⛵','Çeşme Marina',38.3228,26.3039],['🏰','Çeşme Kalesi',38.3226,26.3028],['🛍️','Çeşme Çarşı',38.3221,26.3047],['☕','Starbucks Ilıca',38.3046,26.3591],['🏖️','Ilıca Plajı',38.3039,26.3644],['🧿','Alaçatı Çarşı',38.2814,26.3742],['🌬️','Alaçatı Değirmenleri',38.2846,26.3731],['⚓','Alaçatı Port',38.2577,26.3865],['🌅','Before Sunset Beach',38.2672,26.2735],['🌙','Aya Yorgi Koyu',38.3436,26.3227],['🎧','OM Paparazzi',38.3430,26.3206],['🏝️','Boyalık Beach',38.3280,26.3370],['🐟','Dalyan',38.3581,26.3036],['🌴','Kocakarı Plajı',38.3630,26.2988],['🌞','Altınkum Plajı',38.2702,26.2412],['🏖️','Pırlanta Plajı',38.2696,26.2368],['🪨','Delikli Koy',38.2597,26.4188],['👑','Kleopatra Koyu',38.2628,26.4075],['♨️','Şifne',38.3178,26.4142],['🌿','Reisdere',38.3219,26.4321],['🧊','Paşalimanı',38.3235,26.3847],['🥪','Kumrucu Şevki',38.3222,26.3065],['🍦','İmren Alaçatı',38.2820,26.3742],['🐟','Ferdi Baba Alaçatı',38.2576,26.3862]];places.forEach(function(p){L.marker([p[2],p[3]]).addTo(map).bindPopup('<b>'+p[0]+' '+p[1]+'</b><br>Gerçek pin<br><button onclick="alert(\'Check-in ana uygulamada bağlanacak\')">Check-in</button>')});</script></body></html>
