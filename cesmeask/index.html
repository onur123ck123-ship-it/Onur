<!doctype html><html lang=tr><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1,viewport-fit=cover'><title>ÇeşmeAşk</title><link rel=stylesheet href=https://unpkg.com/leaflet@1.9.4/dist/leaflet.css><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:linear-gradient(#e0f7ff,#fff);color:#062033}main{max-width:560px;margin:auto;padding:18px 14px 92px}.card{background:#fffffff0;border-radius:28px;box-shadow:0 18px 50px #0f5c8024;padding:20px;margin:12px 0}h1{font-size:32px;margin:0}h2{font-size:29px;margin:0 0 10px}.ey{font-size:12px;color:#638092;font-weight:800;letter-spacing:.12em;text-transform:uppercase}.btn,.ghost,.bad{width:100%;border:0;border-radius:18px;padding:14px;font-weight:900}.btn{background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:white}.ghost{background:#f2f8fb;color:#33586a}.bad{background:#fee2e2;color:#991b1b}input,textarea{width:100%;box-sizing:border-box;border:1px solid #d7edf7;border-radius:16px;background:#f8fdff;padding:13px;margin-top:6px}.tabs{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:min(548px,calc(100% - 18px));display:grid;grid-template-columns:repeat(5,1fr);gap:5px;background:#ffffffe6;border-radius:24px;padding:8px;box-shadow:0 18px 50px #0f5c8024}.tab{border:0;border-radius:16px;background:transparent;padding:10px 2px;font-size:11px;font-weight:900;color:#638092}.tab.on{background:#e0f5ff;color:#075985}.venue,.chat{display:flex;gap:12px;align-items:center;width:100%;border:1px solid #d7edf7;border-radius:22px;background:white;padding:14px;text-align:left;margin:10px 0}.emoji{width:50px;height:50px;border-radius:18px;background:#e0f7ff;display:grid;place-items:center;font-size:25px}.right{margin-left:auto;text-align:right;font-size:12px;font-weight:900;color:#12607e}.status{padding:12px;border-radius:16px;background:#e8fff7;color:#047857;font-weight:900}.info{background:#eff6ff;color:#1d4ed8}.warn{background:#fff7ed;color:#c2410c}.map{height:310px;border-radius:24px;overflow:hidden}.pcard{position:relative;min-height:520px;border-radius:32px;overflow:hidden;box-shadow:0 18px 50px #0f5c8024;background:#0ea5e9;color:white;display:flex;align-items:flex-end}.pcard:before{content:'';position:absolute;inset:0;background:linear-gradient(transparent 20%,#000b)}.photo{position:absolute;inset:0;background-size:cover;background-position:center}.pinfo{position:relative;padding:24px}.pill{display:inline-block;background:#ffffff33;color:white;border-radius:99px;padding:7px 9px;margin:4px;font-size:12px;font-weight:800}.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}.round{height:62px;border:0;border-radius:22px;background:white;font-size:28px;box-shadow:0 18px 50px #0f5c8024}.like{color:#10b981}.nope{color:#ef4444}.msgbox{min-height:330px;background:#f6fcff;border:1px solid #d7edf7;border-radius:22px;padding:12px;display:flex;flex-direction:column;gap:8px}.msg{max-width:82%;padding:10px 12px;border-radius:16px;background:white}.me{align-self:flex-end;background:#dff6ff}.sys{align-self:center;background:#eef8ff;color:#638092;font-size:13px}.comp{display:grid;grid-template-columns:1fr 52px;gap:8px}.comp button{border:0;border-radius:16px;background:#0ea5e9;color:white}.ans{white-space:pre-wrap;background:#f8fdff;border:1px solid #d7edf7;border-radius:20px;padding:14px}.toast{position:fixed;left:50%;top:18px;transform:translateX(-50%);width:min(430px,calc(100% - 28px));background:#062033;color:white;border-radius:16px;padding:12px;z-index:5;text-align:center;font-weight:800}.hide{display:none}</style></head><body><div id=toast class='toast hide'></div><main><p class=ey>Çeşme sosyal check-in + AI</p><h1>ÇeşmeAşk</h1><section id=s></section></main><nav class=tabs id=tabs></nav><script src=https://unpkg.com/leaflet@1.9.4/dist/leaflet.js></script><script>const V=[['starbucks-ilica','Starbucks Ilıca','Ilıca','Kahve','☕',[38.3259,26.3060]],['alacati-carsi','Alaçatı Çarşı','Alaçatı','Gezi','🧿',[38.2868,26.3776]],['cesme-marina','Çeşme Marina','Merkez','Marina','⛵',[38.3225,26.3066]],['before-sunset','Before Sunset','Ovacık','Beach','🌅',[38.2605,26.2979]],['fly-inn','Fly-Inn Beach','Altınkum','Beach','🪩',[38.3327,26.2416]],['ayayorgi','Aya Yorgi Koyu','Ayayorgi','Beach','🌙',[38.3117,26.2944]],['dutlu-kahve','Dutlu Kahve','Alaçatı','Kahve','🌳',[38.2894,26.3779]],['ilica-plaji','Ilıca Plajı','Ilıca','Beach','🏝️',[38.3217,26.3046]],['haci-memis','Hacımemiş','Alaçatı','Gezi','🍃',[38.2861,26.3809]],['cesme-carsi','Çeşme Çarşı','Merkez','Gezi','🛍️',[38.3217,26.3055]]].map(x=>({id:x[0],name:x[1],area:x[2],cat:x[3],em:x[4],xy:x[5]}));const P=['https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=900&q=80','https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=900&q=80','https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=900&q=80','https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=900&q=80'];const U=[['Ada','Kadın',20,'Kahve, deniz, akşam yürüyüşü. Doğal mesajları severim.',['kahve','deniz','müzik'],'starbucks-ilica',1,0],['Lara','Kadın',20,'Beach sonrası kahve net. Komik açılışlara ekstra puan.',['beach','foto','tatlı'],'starbucks-ilica',1,1],['Mira','Kadın',19,'Arkadaş grubuyla geldim, önce chat sonra selamlaşma.',['sohbet','dans','kahve'],'alacati-carsi',1,2],['Selin','Kadın',21,'Dutlu Kahve’de sakin akşam. Kitap/kahve muhabbeti açılır.',['kitap','kahve','lofi'],'dutlu-kahve',1,3]].map((x,i)=>({id:'u'+i,name:x[0],g:x[1],age:x[2],bio:x[3],ints:x[4],venue:x[5],like:x[6],photo:P[x[7]]}));const S=(k,v)=>localStorage.setItem('ca_'+k,JSON.stringify(v)),L=(k,d=null)=>{try{return JSON.parse(localStorage.getItem('ca_'+k))??d}catch{return d}};let tab='venues',open=null,map;function me(){return L('me')}function ci(){let c=L('ci');return c&&Date.now()<c.exp?c:null}function st(id){let us=U.filter(u=>u.venue==id),m=ci()?.venue==id?1:0;return{t:us.length+m,w:us.filter(u=>u.g=='Kadın').length,e:us.filter(u=>u.g=='Erkek').length+m}}function top(){return [...V].sort((a,b)=>st(b.id).t-st(a.id).t)[0]}function say(x){toast.textContent=x;toast.classList.remove('hide');setTimeout(()=>toast.classList.add('hide'),1800)}function nav(){tabs.innerHTML=[['venues','📍 Mekân'],['swipe','💫 Keşfet'],['matches','💬 Match'],['ai','🧠 AI'],['profile','👤 Profil']].map(x=>`<button class='tab ${tab==x[0]?'on':''}' onclick='tab="${x[0]}";open=null;draw()'>${x[1]}</button>`).join('')}function draw(){nav();if(!me())return onboard();({venues,swipe,matches,ai,profile})[tab]()}function onboard(){s.innerHTML=`<div class=card><h2>Aynı mekândasınız. Tanışmak karşılıklıysa başlasın.</h2><p>ÇeşmeAşk tam konum göstermez; sadece seçtiğin mekâna check-in yapanları gösterir.</p><form onsubmit='event.preventDefault();S("me",{name:n.value,age:a.value,bio:b.value||"Çeşme’deyim, iyi sohbet iyi gider.",phone:""});draw()'><label>Ad<input id=n required placeholder=Onur></label><label>Yaş<input id=a type=number min=18 required placeholder=19></label><label>Bio<textarea id=b></textarea></label><button class=btn>Başla</button></form></div>`}function venues(){let tv=top();s.innerHTML=`<div class=card><h2>Bugün nerdesin?</h2><div class='status info'>🔥 En dolu: ${tv.name} · ${st(tv.id).t} kişi</div>${ci()?`<div class=status>✅ ${V.find(v=>v.id==ci().venue).name}</div><button class=bad onclick='S("ci",null);draw()'>Check-in’i bitir</button>`:`<div class='status warn'>Aktif check-in yok.</div>`}</div><div class=card><h3>Çeşme Haritası</h3><div id=map class=map></div></div>${V.map(v=>{let a=st(v.id);return`<button class=venue onclick='checkin("${v.id}")'><span class=emoji>${v.em}</span><span><b>${v.name}</b><br><small>${v.area} · ${v.cat}</small></span><span class=right>${a.t} kişi<br>♀ ${a.w} · ♂ ${a.e}</span></button>`}).join('')}`;setTimeout(initMap,0)}function checkin(id){S('ci',{venue:id,exp:Date.now()+7200000});tab='swipe';say('Check-in yapıldı');draw()}function initMap(){if(!L)return;if(map)map.remove();map=L.map('map').setView([38.304,26.309],11);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);V.forEach(v=>L.marker(v.xy).addTo(map).bindPopup(`<b>${v.name}</b><br>${st(v.id).t} kişi`))}function cand(){let c=ci();if(!c)return[];let seen=new Set(L('sw',[]).map(x=>x.u));return U.filter(u=>u.venue==c.venue&&!seen.has(u.id))}function swipe(){if(!ci())return s.innerHTML=`<div class=card><h2>Önce mekân seç</h2><button class=btn onclick='tab="venues";draw()'>Mekân seç</button></div>`;let u=cand()[0];if(!u)return s.innerHTML=`<div class=card><h2>Şimdilik bu kadar</h2><button class=btn onclick='tab="venues";draw()'>Mekân değiştir</button></div>`;s.innerHTML=`<div class=pcard><div class=photo style='background-image:url(${u.photo})'></div><div class=pinfo><h2>${u.name}, ${u.age}</h2><p>${u.bio}</p>${u.ints.map(i=>`<span class=pill>${i}</span>`).join('')}</div></div><div class=actions><button class='round nope' onclick='dosw("${u.id}",0)'>✕</button><button class='round like' onclick='dosw("${u.id}",1)'>♥</button></div>`}function dosw(id,like){let sw=L('sw',[]);sw.push({u:id,like});S('sw',sw);let u=U.find(x=>x.id==id);if(like&&u.like){let ms=L('ms',[]);ms.unshift({id:'m'+Date.now(),u:id});S('ms',ms);tab='matches';say('Match!')}draw()}function matches(){let ms=L('ms',[]);s.innerHTML=ms.length?`<div class=card><h2>Match’lerin</h2><p>Demo chat. Sıradaki adım Supabase ile gerçek mesajlaşma.</p></div>${ms.map(m=>{let u=U.find(x=>x.id==m.u);return`<button class=chat onclick='open="${m.id}";chat("${m.id}")'><img src=${u.photo} style='width:52px;height:52px;border-radius:18px;object-fit:cover'><span><b>${u.name}</b><br><small>Mesajlaşmaya başla</small></span></button>`}).join('')}`:`<div class=card><h2>Henüz match yok</h2><button class=btn onclick='tab="swipe";draw()'>Keşfet</button></div>`}function chat(id){let all=L('msg',{}),th=all[id]||[{f:'sys',b:'İlk mesajı sen at!'}];s.innerHTML=`<div class=card><button class=ghost onclick='open=null;draw()'>← Dön</button><div class=msgbox>${th.map(x=>`<div class='msg ${x.f=="me"?"me":"sys"}'>${x.b}</div>`).join('')}</div><form class=comp onsubmit='event.preventDefault();let all=L("msg",{});all["${id}"]=[...(all["${id}"]||[]),{f:"me",b:msg.value},{f:"sys",b:"Güzel mesaj 😄 Çeşme’de en çok nereyi seviyorsun?"}];S("msg",all);chat("${id}")'><input id=msg><button>➤</button></form></div>`}function ai(){let tv=top();s.innerHTML=`<div class=card><h2>ÇeşmeAşk AI</h2><div class='status info'>${tv.name}: ${st(tv.id).t} kişi · ♀ ${st(tv.id).w}</div><button class=ghost onclick='ans.textContent="Selam, ${tv.name} seçimin iyiymiş 😄 Burada favorin ne?"'>Bu kıza ne yazayım?</button><div id=ans class=ans>Hazırım 😄</div></div>`}function profile(){let p=me();s.innerHTML=`<div class=card><h2>${p.name}, ${p.age}</h2><p>${p.bio}</p><button class=bad onclick='localStorage.clear();location.reload()'>Demo sıfırla</button></div>`}draw();</script></body></html>
