<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Çeşme Refleks</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial;background:linear-gradient(135deg,#dff6ff,#fff7ed);color:#082f49;padding:14px}.wrap{max-width:520px;margin:auto}.card{background:#fffffff2;border:1px solid #dbeafe;border-radius:24px;padding:16px;margin:12px 0;box-shadow:0 12px 32px #07598522}.btn{width:100%;border:0;border-radius:16px;padding:14px;margin-top:10px;background:#0ea5e9;color:white;font-weight:950;font-size:17px}.light{background:#eff6ff;color:#075985}.arena{height:360px;border-radius:24px;background:linear-gradient(135deg,#bae6fd,#fed7aa);position:relative;overflow:hidden}.target{position:absolute;width:62px;height:62px;border:0;border-radius:50%;background:white;font-size:30px;box-shadow:0 8px 22px #0002}.bad{background:#fee2e2}.row{display:flex;gap:8px}.row>*{flex:1}input{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:14px;padding:12px;font:inherit}.score{font-size:34px;font-weight:950}.small{color:#64748b}.rank{display:flex;justify-content:space-between;gap:8px;align-items:center;border-bottom:1px solid #e2e8f0;padding:10px 0}.rank button{width:auto;margin:0;padding:8px 10px}</style></head><body><div class="wrap"><h1>🎮 Çeşme Refleks</h1><div class="card"><p class="small">30 saniye. Çeşme objelerine bas: 💙 🌊 🍦 🧿 ⛵. Bombaya basma: 💣</p><input id="player" placeholder="İsim"><button class="btn" onclick="startGame()">Oyuna başla</button><div class="row"><div class="card"><div>Skor</div><div id="score" class="score">0</div></div><div class="card"><div>Süre</div><div id="time" class="score">30</div></div></div></div><div class="arena" id="arena"><button id="target" class="target" onclick="tapTarget()">💙</button></div><div class="card"><h2>🏆 Puan tablosu</h2><button class="btn light" onclick="loadBoard()">Yenile</button><div id="board"></div></div><div id="profile" class="card" style="display:none"></div><p><a href="/">← Ana uygulamaya dön</a></p></div><script>var API='https://bztigwfnenwosulhxrxo.supabase.co/rest/v1/';var KEY='sb_publishable_P76ca2ta_N7PWpA_Wm6lTw__DEzK19l';var s=0,t=30,playing=false,timer=null,cur='💙';var good=['💙','🌊','🍦','🧿','⛵'];function esc(x){return String(x||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}function dev(){var d=localStorage.ca_device;if(!d){d='dev_'+Math.random().toString(36).slice(2);localStorage.ca_device=d}return d}function api(path,params,opt){var u=new URL(API+path);Object.keys(params||{}).forEach(function(k){u.searchParams.set(k,params[k])});return fetch(u,{method:(opt&&opt.method)||'GET',headers:{apikey:KEY,'Content-Type':'application/json'},body:opt&&opt.body?JSON.stringify(opt.body):undefined}).then(function(r){return r.text().then(function(x){var d=x?JSON.parse(x):null;if(!r.ok)throw Error((d&&d.message)||x);return d})})}function place(){cur=Math.random()<.78?good[Math.floor(Math.random()*good.length)]:'💣';target.textContent=cur;target.className='target '+(cur==='💣'?'bad':'');target.style.left=(Math.random()*76+8)+'%';target.style.top=(Math.random()*70+10)+'%'}function startGame(){s=0;t=30;playing=true;score.textContent=s;time.textContent=t;place();clearInterval(timer);timer=setInterval(function(){t--;time.textContent=t;if(t<=0)finish()},1000)}function tapTarget(){if(!playing)return;if(cur==='💣')s=Math.max(0,s-20);else s+=10;score.textContent=s;place()}function finish(){playing=false;clearInterval(timer);saveScore()}function saveScore(){var name=player.value.trim()||localStorage.liveName||'İsimsiz';localStorage.liveName=name;api('game_scores',{}, {method:'POST',body:{game:'cesme_refleks',device_id:dev(),display_name:name,score:s}}).then(loadBoard).catch(function(e){alert('Skor kaydolmadı: '+e.message)})}function loadBoard(){api('rpc/top_game_scores',{}, {method:'POST',body:{p_game:'cesme_refleks'}}).then(function(rows){board.innerHTML=(rows||[]).map(function(r,i){return '<div class="rank"><b>#'+(i+1)+' '+esc(r.display_name)+'</b><span>'+r.score+' puan</span><button class="btn light" onclick="showProfile('+i+')">Profil</button></div>'}).join('')||'Henüz skor yok.';window.rows=rows||[]})}function showProfile(i){var r=window.rows[i];profile.style.display='block';profile.innerHTML='<h2>'+esc(r.display_name)+'</h2><p><b>'+r.score+' puan</b></p><p>'+esc(r.gender||'')+' '+esc(r.age||'')+'</p><p>'+esc(r.bio||'Profil bio yok')+'</p><p>'+esc(r.interests||'')+'</p>'}place();loadBoard();</script></body></html>
